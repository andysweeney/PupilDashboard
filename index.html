// ── SEND FOCUS VIEW ──
function rSEND(){
  const out=document.getElementById('send-out');
  out.innerHTML='<div style="color:var(--mu);padding:1rem">Loading SEND data...</div>';
  const ygVal=document.getElementById('send-yg').value;
  const SAN=DD.sanctions||[];
  const _sToday=new Date();
  const _sTodayISO=`${_sToday.getFullYear()}-${String(_sToday.getMonth()+1).padStart(2,'0')}-${String(_sToday.getDate()).padStart(2,'0')}`;
  const ayStart=`${CAY}-09-01`;

  // Collect flagged pupils — flagIdx: 4=SEND, 5=EHCP, 6=FSM
  function collectFlagged(flagIdx,flagName){
    const pupils=[];
    for(const[ik,periods]of Object.entries(PRG)){
      const ink=parseInt(ik.slice(1));
      const yg=curYG(ink);
      if(yg<7||yg>11) continue;
      if(ygVal!=='all'&&yg!==parseInt(ygVal)) continue;

      const pp=ygPeriods(yg);
      if(!pp.length) continue;
      const lp=pp[pp.length-1];
      const lr=ygRows(yg,lp);
      const prevTermP=pp.length>=2?pp[pp.length-2]:null;
      const prevYearP=pp.length>=4?pp[pp.length-4]:null;

      lr.forEach(r=>{
        if(!r[flagIdx]) return;
        const px=r[0],pid=r[1];
        const en=getEn(ink,px);
        const tg=curTG(en);

        // Date range from progress periods where flag was set
        const flagPeriods=[];
        pp.forEach(p=>{
          const pRows=(PRG[ik]||{})[p]||[];
          const pRow=pRows.find(row=>row[0]===px);
          if(pRow&&pRow[flagIdx]) flagPeriods.push(PL[PER.indexOf(p)]||p);
        });
        const flagDateStr=flagPeriods.length?`${flagPeriods[0]} → present`:'Current';

        // YTD sanctions
        const pSanc=SAN.filter(s=>s[0]===px&&s[2]>=ayStart&&s[2]<=_sTodayISO);
        const ytdCodes=pSanc.filter(s=>s[1]===0).length;
        const ytdOnCalls=pSanc.filter(s=>s[1]===1).length;
        const ytdDets=pSanc.filter(s=>s[1]===2).length;

        // Overall averages
        const curScores=SUBS.map(s=>r[3][s]?AS[AM[r[3][s][0]]]||0:0).filter(v=>v>0);
        const curEffort=SUBS.map(s=>r[3][s]?r[3][s][1]:null).filter(v=>v!=null&&v>0);
        const avgAb=curScores.length?curScores.reduce((a,b)=>a+b,0)/curScores.length:null;
        const avgEf=curEffort.length?curEffort.reduce((a,b)=>a+b,0)/curEffort.length:null;

        let avgAbLT=null,avgEfLT=null;
        if(prevTermP){
          const ltRows=(PRG[ik]||{})[prevTermP]||[];
          const ltR=ltRows.find(row=>row[0]===px);
          if(ltR){
            const ltS=SUBS.map(s=>ltR[3][s]?AS[AM[ltR[3][s][0]]]||0:0).filter(v=>v>0);
            const ltE=SUBS.map(s=>ltR[3][s]?ltR[3][s][1]:null).filter(v=>v!=null&&v>0);
            avgAbLT=ltS.length?ltS.reduce((a,b)=>a+b,0)/ltS.length:null;
            avgEfLT=ltE.length?ltE.reduce((a,b)=>a+b,0)/ltE.length:null;
          }
        }

        let avgAbLY=null,avgEfLY=null;
        if(prevYearP){
          const lyRows=(PRG[ik]||{})[prevYearP]||[];
          const lyR=lyRows.find(row=>row[0]===px);
          if(lyR){
            const lyS=SUBS.map(s=>lyR[3][s]?AS[AM[lyR[3][s][0]]]||0:0).filter(v=>v>0);
            const lyE=SUBS.map(s=>lyR[3][s]?lyR[3][s][1]:null).filter(v=>v!=null&&v>0);
            avgAbLY=lyS.length?lyS.reduce((a,b)=>a+b,0)/lyS.length:null;
            avgEfLY=lyE.length?lyE.reduce((a,b)=>a+b,0)/lyE.length:null;
          }
        }

        // Per-subject breakdown
        const subjRows=SUBS.map(s=>{
          const cur=r[3][s];
          const curA=cur?AS[AM[cur[0]]]||null:null;
          const curE=cur?cur[1]:null;
          let ltA=null,ltE2=null,lyA=null,lyE2=null;
          if(prevTermP){
            const ltRows2=(PRG[ik]||{})[prevTermP]||[];
            const ltR2=ltRows2.find(row=>row[0]===px);
            if(ltR2&&ltR2[3][s]){ltA=AS[AM[ltR2[3][s][0]]]||null;ltE2=ltR2[3][s][1]||null}
          }
          if(prevYearP){
            const lyRows2=(PRG[ik]||{})[prevYearP]||[];
            const lyR2=lyRows2.find(row=>row[0]===px);
            if(lyR2&&lyR2[3][s]){lyA=AS[AM[lyR2[3][s][0]]]||null;lyE2=lyR2[3][s][1]||null}
          }
          return{s,curA,curE,ltA,ltE:ltE2,lyA,lyE:lyE2};
        }).filter(s=>s.curA!=null||s.curE!=null);

        pupils.push({px,pid,yg,tg,flagDateStr,ytdCodes,ytdOnCalls,ytdDets,avgAb,avgEf,avgAbLT,avgEfLT,avgAbLY,avgEfLY,subjRows});
      });
    }
    pupils.sort((a,b)=>a.yg-b.yg||a.pid.localeCompare(b.pid));
    return pupils;
  }

  function vf(v){return v!=null?v.toFixed(1):'—'}
  function abCol(v){return v!=null?`color:${aC(v)}`:'color:var(--mu)'}
  function efCol(v){return v!=null?`color:${eC(v)}`:'color:var(--mu)'}
  function chgArrow(cur,prev){
    if(cur==null||prev==null) return'';
    const d=cur-prev;
    if(Math.abs(d)<0.05) return'';
    return d>0?`<span style="color:#34d399;font-size:.55rem;margin-left:.15rem">▲</span>`:`<span style="color:#ef4444;font-size:.55rem;margin-left:.15rem">▼</span>`;
  }

  function buildTable(pupils,flagName,flagColor,tablePrefix){
    if(!pupils.length) return`<div class="dw" style="margin-bottom:1rem"><div class="dwt">${flagName} Pupils</div><div style="color:var(--mu);font-size:.8rem;padding:.5rem 0">No ${flagName} pupils found</div></div>`;

    const rows=pupils.map((p,i)=>{
      const uid=`${tablePrefix}-${i}`;
      const subjDetail=p.subjRows.map(s=>`<tr>
        <td style="font-size:.72rem;font-weight:500;padding-left:2rem">${s.s}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;${efCol(s.curE)}">${vf(s.curE)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--mu)">${vf(s.ltE)}${chgArrow(s.curE,s.ltE)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--mu)">${vf(s.lyE)}${chgArrow(s.curE,s.lyE)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;${abCol(s.curA)}">${vf(s.curA)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--mu)">${vf(s.ltA)}${chgArrow(s.curA,s.ltA)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--mu)">${vf(s.lyA)}${chgArrow(s.curA,s.lyA)}</td>
      </tr>`).join('');

      return`<tr style="cursor:pointer" onclick="const d=document.getElementById('${uid}');d.classList.toggle('tt-hide');this.querySelector('.tv-arrow').classList.toggle('tt-open')">
        <td style="font-weight:500">${pLink(p.px,p.pid)} <span class="tv-arrow" style="font-size:.5rem;transition:transform .2s;display:inline-block">▼</span></td>
        <td style="text-align:center;font-size:.72rem;color:var(--mu)">Y${p.yg}</td>
        <td style="font-size:.72rem;color:var(--mu)">${p.tg}</td>
        <td style="font-size:.65rem;color:var(--mu)">${p.flagDateStr}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;${p.ytdCodes?'color:#f97316;font-weight:600':'color:var(--mu)'}">${p.ytdCodes||'—'}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;${p.ytdOnCalls?'color:#ef4444;font-weight:600':'color:var(--mu)'}">${p.ytdOnCalls||'—'}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;${p.ytdDets?'color:#7c3aed;font-weight:600':'color:var(--mu)'}">${p.ytdDets||'—'}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;${efCol(p.avgEf)}">${vf(p.avgEf)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${vf(p.avgEfLT)}${chgArrow(p.avgEf,p.avgEfLT)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${vf(p.avgEfLY)}${chgArrow(p.avgEf,p.avgEfLY)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;${abCol(p.avgAb)}">${vf(p.avgAb)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${vf(p.avgAbLT)}${chgArrow(p.avgAb,p.avgAbLT)}</td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${vf(p.avgAbLY)}${chgArrow(p.avgAb,p.avgAbLY)}</td>
      </tr>
      <tr id="${uid}" class="tt-hide"><td colspan="13" style="padding:0;border:none">
        <table class="d" style="margin:.3rem 0 .6rem 1rem;width:calc(100% - 1rem)"><thead><tr>
          <th>Subject</th><th style="text-align:center">Effort</th><th style="text-align:center">Ef. LT</th><th style="text-align:center">Ef. LY</th><th style="text-align:center">Ability</th><th style="text-align:center">Ab. LT</th><th style="text-align:center">Ab. LY</th>
        </tr></thead><tbody>${subjDetail}</tbody></table>
      </td></tr>`;
    }).join('');

    const filterLabel=ygVal==='all'?'All Years':'Y'+ygVal;
    const sinceLabel=flagName==='SEND'?'SEND Since':flagName==='EHCP'?'EHCP Since':'FSM Since';
    return`<div class="dw" style="margin-bottom:1rem"><div class="dwt"><span style="color:${flagColor}">${flagName}</span> Pupils <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.68rem;color:var(--mu)">— ${filterLabel} · ${pupils.length} pupil${pupils.length!==1?'s':''}</span></div>
      <div style="overflow-x:auto"><table class="d"><thead><tr>
        <th>Name</th><th style="text-align:center">Year</th><th>TG</th><th>${sinceLabel}</th>
        <th style="text-align:center;color:#f97316">YTD Codes</th><th style="text-align:center;color:#ef4444">YTD On-Calls</th><th style="text-align:center;color:#7c3aed">YTD Det.</th>
        <th style="text-align:center">Effort</th><th style="text-align:center">Ef. LT</th><th style="text-align:center">Ef. LY</th>
        <th style="text-align:center">Ability</th><th style="text-align:center">Ab. LT</th><th style="text-align:center">Ab. LY</th>
      </tr></thead><tbody>${rows}</tbody></table></div>
      <div style="font-size:.6rem;color:var(--mu);margin-top:.4rem">LT = Last Term · LY = Last Year (same term, previous AY) · ▲ improved · ▼ declined · Click row to expand per-subject detail</div>
    </div>`;
  }

  const sendPupils=collectFlagged(4,'SEND');
  const ehcpPupils=collectFlagged(5,'EHCP');
  const fsmPupils=collectFlagged(6,'FSM');

  out.innerHTML=buildTable(sendPupils,'SEND','#f97316','send-exp')+buildTable(ehcpPupils,'EHCP','#a78bfa','ehcp-exp')+buildTable(fsmPupils,'FSM','#6488ff','fsm-exp');
}

function rPP(){
  const out=document.getElementById('pp-out');
  out.innerHTML='<div style="color:var(--mu);padding:1rem">Analysing sanctions data...</div>';

  const ygVal=document.getElementById('pp-yg').value;
  const SAN=DD.sanctions||[];
  const _ppToday=new Date();
  const _ppTodayISO=`${_ppToday.getFullYear()}-${String(_ppToday.getMonth()+1).padStart(2,'0')}-${String(_ppToday.getDate()).padStart(2,'0')}`;

  // Get pupil set for selected year group(s)
  let pupilSet=null;
  if(ygVal!=='all'){
    const yg=parseInt(ygVal);
    const pp2=ygPeriods(yg);
    if(pp2.length){
      const lr2=ygRows(yg,pp2[pp2.length-1]);
      pupilSet=new Set(lr2.map(r=>r[0]));
    }else{
      pupilSet=new Set();
    }
  }

  // Group sanctions by lesson: date|period|subject|class -> [pupil indices]
  // Look up each pupil's class for the subject to ensure only same-class pupils are grouped
  const ENR2=DD.enrolments||{};
  const pupilClassMap={};// "px|subject" -> class number
  for(const[ik,enrols2] of Object.entries(ENR2)){
    enrols2.filter(r=>r.t==='cls'&&r.u===null).forEach(r=>{
      pupilClassMap[r.x+'|'+r.s]=r.c;
    });
  }

  const lessonMap={};
  SAN.filter(s=>s[2]<=_ppTodayISO&&s[3]!=null&&(!pupilSet||pupilSet.has(s[0]))).forEach(s=>{
    const cls=pupilClassMap[s[0]+'|'+s[3]]||'?';
    const key=`${s[2]}|${s[4]}|${s[3]}|${cls}`;
    if(!lessonMap[key])lessonMap[key]=[];
    lessonMap[key].push(s[0]);
  });

  // Detect all groups (exact combinations) from lessons with 2+ sanctioned pupils
  const groupCounts={};// "sorted px list" -> {count, subjects}
  for(const[key,pupils] of Object.entries(lessonMap)){
    const unique=[...new Set(pupils)].sort((a,b)=>a-b);
    if(unique.length<2) continue;
    const subj=key.split('|')[2];

    // Record the exact group
    const gk=unique.join(',');
    if(!groupCounts[gk])groupCounts[gk]={count:0,subjects:new Set()};
    groupCounts[gk].count++;
    groupCounts[gk].subjects.add(subj);

    // Also record all pairs (subsets of size 2)
    if(unique.length>2){
      for(let i=0;i<unique.length;i++){
        for(let j=i+1;j<unique.length;j++){
          const pk=`${unique[i]},${unique[j]}`;
          if(!groupCounts[pk])groupCounts[pk]={count:0,subjects:new Set()};
          groupCounts[pk].count++;
          groupCounts[pk].subjects.add(subj);
        }
      }
    }
  }

  // Convert to array, classify by size
  const allGroups=Object.entries(groupCounts).map(([gk,data])=>{
    const members=gk.split(',').map(Number);
    const names=members.map(px=>{
      const pu=REG[px];
      return pu?pu.id.replace(/\s*\(P\d+\)\s*$/,''):`#${px}`;
    });
    const tgs=members.map(px=>{
      const pu=REG[px];
      if(!pu) return'—';
      const en2=getEn(pu.intake,px);
      return curTG(en2);
    });
    const ygs=members.map(px=>{
      const pu=REG[px];
      return pu?'Y'+curYG(pu.intake):'—';
    });
    return{members,names,tgs,ygs,size:members.length,count:data.count,subjects:[...data.subjects].sort()};
  }).filter(g=>g.count>=2).sort((a,b)=>b.count-a.count);

  // Group by size
  const bySz={};
  allGroups.forEach(g=>{
    if(!bySz[g.size])bySz[g.size]=[];
    bySz[g.size].push(g);
  });

  const sizeLabel=(sz)=>sz===2?'Pairs':sz===3?'Triples':sz===4?'Quads':sz===5?'Quintets':'Groups of '+sz;
  const filterLabel=ygVal==='all'?'All Years':`Y${ygVal}`;

  if(!allGroups.length){
    out.innerHTML=`<div style="color:var(--mu);padding:2rem">No problem groups found for ${filterLabel} (minimum 2 simultaneous sanctions required)</div>`;
    return;
  }

  // Build a table for each group size, largest first
  const sizes=Object.keys(bySz).map(Number).sort((a,b)=>b-a);
  const tables=sizes.map(sz=>{
    const groups=bySz[sz];
    const label=sizeLabel(sz);

    // Build dynamic pupil columns
    const pupilHeaders=Array.from({length:sz},(_,i)=>`<th>Pupil ${i+1}</th>`).join('');
    const rows=groups.map((g,i)=>{
      const pupilCells=g.members.map((px,j)=>
        `<td><span style="font-family:'JetBrains Mono',monospace;font-weight:500">${pLink(px,g.names[j])}</span><div style="font-size:.58rem;color:var(--mu)">${g.ygs[j]} · ${g.tgs[j]}</div></td>`
      ).join('');
      const subjTags=g.subjects.map(s=>`<span style="display:inline-block;padding:.08rem .35rem;margin:.1rem;border-radius:4px;background:var(--sf2);border:1px solid var(--bd);font-size:.68rem">${s}</span>`).join('');
      return`<tr>
        <td style="color:var(--mu);font-size:.7rem;text-align:center">${i+1}</td>
        ${pupilCells}
        <td style="text-align:center;font-weight:600;font-family:'JetBrains Mono',monospace">${g.count}</td>
        <td>${subjTags}</td>
      </tr>`;
    }).join('');

    return`<div class="dw" style="margin-bottom:1rem"><div class="dwt">${label} <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--mu);font-size:.68rem">— ${groups.length} ${label.toLowerCase()} with 2+ simultaneous sanctions</span></div>
      <div style="overflow-x:auto"><table class="d"><thead><tr>
        <th style="text-align:center">#</th>
        ${pupilHeaders}
        <th style="text-align:center">Times</th>
        <th>Subjects</th>
      </tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join('');

  out.innerHTML=tables;
}

function renderDistCharts(){
  const ctx=window._distCtx;
  if(!ctx) return;
  const {psAY:allPsAY,ayLabels:allAyLabels,ayColors,TNames,ink}=ctx;
  const typeTipHtml=window._typeTipHtml;
  const filterVal=document.getElementById('dist-yg-filter')?.value||'all';

  // Filter by selected year
  let filtered=allPsAY;
  let visAyLabels=allAyLabels;
  if(filterVal!=='all'){
    const ay=parseInt(filterVal);
    const ayLbl=`${ay}-${(ay+1)%100}`;
    filtered=allPsAY.filter(r=>r.ay===ayLbl);
    visAyLabels=[ayLbl];
  }

  const distTipData={};
  const dowNames=['Mon','Tue','Wed','Thu','Fri'];

  // DOW
  const dowAyCounts={},dowItems={};
  filtered.forEach(r=>{const d2=new Date(r.d+'T12:00:00');const dow=d2.getDay();if(dow>=1&&dow<=5){const k=dow-1;if(!dowAyCounts[k])dowAyCounts[k]={};dowAyCounts[k][r.ay]=(dowAyCounts[k][r.ay]||0)+1;if(!dowItems[k])dowItems[k]=[];dowItems[k].push(r)}});
  const dowTotals=dowNames.map((_,i)=>visAyLabels.reduce((s,ay)=>(s+(dowAyCounts[i]?.[ay]||0)),0));
  const maxDowT=Math.max(...dowTotals,1);

  dowNames.forEach((name,i)=>{
    const items=dowItems[i]||[];
    distTipData['dow-'+i]=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.3rem;color:var(--tx)">${name}</div><div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">${dowTotals[i]} sanction${dowTotals[i]!==1?'s':''}</div>${typeTipHtml(items)}`;
  });

  const dowGrid=`<div style="display:flex;gap:.35rem;align-items:flex-end">${dowNames.map((name,i)=>{
    const total=dowTotals[i];
    const h=Math.max(8,Math.round(total/maxDowT*80));
    const segments=visAyLabels.map((ay,ai)=>{const c=dowAyCounts[i]?.[ay]||0;if(!c)return'';const sh=Math.max(1,Math.round(c/total*h));return`<div style="width:100%;height:${sh}px;background:${ayColors[ai%ayColors.length]}"></div>`}).join('');
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer" data-dist-tip="dow-${i}"><div style="width:36px;height:${h}px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column-reverse">${segments}</div><span style="font-size:.6rem;font-family:'JetBrains Mono',monospace;color:var(--tx)">${total||''}</span><span style="font-size:.65rem;color:var(--mu)">${name}</span></div>`;
  }).join('')}</div>`;

  // Period + N/L
  const lesAyCounts={},lesItems={};
  const lesNames=['P1','P2','P3','P4','P5','N/L'];
  filtered.forEach(r=>{
    const k=(r.p>=1&&r.p<=5)?r.p-1:5;
    if(!lesAyCounts[k])lesAyCounts[k]={};lesAyCounts[k][r.ay]=(lesAyCounts[k][r.ay]||0)+1;
    if(!lesItems[k])lesItems[k]=[];lesItems[k].push(r);
  });
  const lesTotals=lesNames.map((_,i)=>visAyLabels.reduce((s,ay)=>(s+(lesAyCounts[i]?.[ay]||0)),0));
  const maxLesT=Math.max(...lesTotals,1);

  lesNames.forEach((name,i)=>{
    const items=lesItems[i]||[];
    distTipData['les-'+i]=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.3rem;color:var(--tx)">${name}</div><div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">${lesTotals[i]} sanction${lesTotals[i]!==1?'s':''}</div>${typeTipHtml(items)}`;
  });

  const lesGrid=`<div style="display:flex;gap:.35rem;align-items:flex-end">${lesNames.map((name,i)=>{
    const total=lesTotals[i];
    const h=Math.max(8,Math.round(total/maxLesT*80));
    const segments=visAyLabels.map((ay,ai)=>{const c=lesAyCounts[i]?.[ay]||0;if(!c)return'';const sh=Math.max(1,Math.round(c/total*h));return`<div style="width:100%;height:${sh}px;background:${ayColors[ai%ayColors.length]}"></div>`}).join('');
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer" data-dist-tip="les-${i}"><div style="width:36px;height:${h}px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column-reverse">${segments}</div><span style="font-size:.6rem;font-family:'JetBrains Mono',monospace;color:var(--tx)">${total||''}</span><span style="font-size:.65rem;color:var(--mu)">${name}</span></div>`;
  }).join('')}</div>`;

  // Subject
  const subjAyCounts={},subjItems={};
  filtered.forEach(r=>{if(!r.s)return;if(!subjAyCounts[r.s])subjAyCounts[r.s]={};subjAyCounts[r.s][r.ay]=(subjAyCounts[r.s][r.ay]||0)+1;if(!subjItems[r.s])subjItems[r.s]=[];subjItems[r.s].push(r)});
  const subjTotals={};
  for(const[s,ays]of Object.entries(subjAyCounts)) subjTotals[s]=Object.values(ays).reduce((a,b)=>a+b,0);
  const subjsSorted2=Object.keys(subjTotals).sort((a,b)=>subjTotals[b]-subjTotals[a]);
  const maxSubj2=Math.max(...Object.values(subjTotals),1);

  // Build subject tooltip data — with proper table by year
  subjsSorted2.forEach(s=>{
    const items=subjItems[s]||[];
    const total=subjTotals[s];
    const c=[0,0,0];items.forEach(r=>c[r.t]++);
    let h=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.3rem;color:var(--tx)">${s}</div>`;
    h+=`<div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">${total} sanction${total!==1?'s':''}</div>`;
    h+=`<div style="margin-bottom:.4rem">${TNames.map((n,i)=>c[i]?`<span style="color:${['#f97316','#ef4444','#7c3aed'][i]};font-weight:600">${c[i]} ${n}${c[i]!==1?'s':''}</span>`:null).filter(Boolean).join(' · ')}</div>`;
    // Table by academic year
    const ayData=visAyLabels.map(ay=>{
      const ayItems=items.filter(r=>r.ay===ay);
      const ac=[0,0,0];ayItems.forEach(r=>ac[r.t]++);
      return{ay,codes:ac[0],oncalls:ac[1],dets:ac[2],total:ac[0]+ac[1]+ac[2]};
    }).filter(d=>d.total>0);
    if(ayData.length){
      h+=`<table style="width:100%;border-collapse:collapse;font-size:.68rem;margin-top:.2rem"><thead><tr style="border-bottom:1px solid rgba(38,45,68,.3)"><th style="text-align:left;color:var(--mu);padding:.15rem .3rem">Year</th><th style="text-align:center;color:#f97316;padding:.15rem .3rem">Codes</th><th style="text-align:center;color:#ef4444;padding:.15rem .3rem">On-Calls</th><th style="text-align:center;color:#7c3aed;padding:.15rem .3rem">Det.</th></tr></thead><tbody>`;
      ayData.forEach(d=>{
        h+=`<tr style="border-bottom:1px solid rgba(38,45,68,.15)"><td style="padding:.15rem .3rem;color:var(--mu)">${d.ay}</td><td style="text-align:center;padding:.15rem .3rem;font-family:'JetBrains Mono',monospace">${d.codes||'—'}</td><td style="text-align:center;padding:.15rem .3rem;font-family:'JetBrains Mono',monospace">${d.oncalls||'—'}</td><td style="text-align:center;padding:.15rem .3rem;font-family:'JetBrains Mono',monospace">${d.dets||'—'}</td></tr>`;
      });
      h+=`</tbody></table>`;
    }
    distTipData['subj-'+s]=h;
  });

  const subjGrid=`<div style="display:flex;flex-direction:column;gap:.3rem">
    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem">${visAyLabels.map((ay,i)=>`<span style="font-size:.6rem;color:${ayColors[i%ayColors.length]}">● ${ay}</span>`).join('')}</div>
    ${subjsSorted2.map(s=>{
    const total=subjTotals[s];
    const maxBarW=200;
    return`<div style="display:flex;align-items:center;gap:.4rem;cursor:pointer" data-dist-tip="subj-${s}"><span style="font-size:.65rem;color:var(--mu);min-width:6.5rem;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s}</span><div style="display:flex;height:14px;border-radius:2px;overflow:hidden">${visAyLabels.map((ay,ai)=>{
      const c2=subjAyCounts[s]?.[ay]||0;if(!c2)return'';
      const w=Math.max(2,Math.round(c2/maxSubj2*maxBarW));
      return`<div style="width:${w}px;background:${ayColors[ai%ayColors.length]}"></div>`;
    }).join('')}</div><span style="font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--mu)">${total}</span></div>`;
  }).join('')}</div>`;

  // Render into containers
  document.getElementById('dist-dow-legend').innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.4rem">${visAyLabels.map((ay,i)=>`<span style="font-size:.6rem;color:${ayColors[i%ayColors.length]}">● ${ay}</span>`).join('')}</div>`;
  document.getElementById('dist-dow-les').innerHTML=dowGrid+lesGrid;
  document.getElementById('dist-subj').innerHTML=subjGrid;
  window._distTipData=distTipData;
}

function renderPupilNet(){
  const ctx=window._pNetCtx;
  if(!ctx) return;
  const selAY=parseInt(document.getElementById('pnet-ay').value);
  const ayStart=`${selAY}-09-01`,ayEnd=`${selAY+1}-07-31`;
  const netToday=new Date();
  const netTodayISO=`${netToday.getFullYear()}-${String(netToday.getMonth()+1).padStart(2,'0')}-${String(netToday.getDate()).padStart(2,'0')}`;
  const ayEndCap=ayEnd<netTodayISO?ayEnd:netTodayISO;
  const x=ctx.px,puName=ctx.puName;
  const subjF=ctx.subjFilter||null;
  const pSAN=DD.sanctions||[];
  const mySancAll=pSAN.filter(s=>s[0]===x&&s[2]>=ayStart&&s[2]<=ayEndCap&&(!subjF||s[3]===subjF));
  const mySanc=mySancAll.filter(s=>s[3]!=null);// Only lesson sanctions for co-detection
  const mySancCount=mySancAll.length;// Total includes non-lesson
  
  // Look up pupil's class for each subject to build class-aware lesson keys
  const pnENR=DD.enrolments||{};
  const pnClsMap={};// "px|subject" -> class number
  for(const[ik,enrols2] of Object.entries(pnENR)){
    enrols2.filter(r=>r.t==='cls'&&r.u===null).forEach(r=>{
      pnClsMap[r.x+'|'+r.s]=r.c;
    });
  }

  const myLessons={};
  mySanc.forEach(s=>{const cls=pnClsMap[x+'|'+s[3]]||'?';myLessons[`${s[2]}|${s[4]}|${s[3]}|${cls}`]=true});
  const coSancW={},coSancSubjs={};
  pSAN.filter(s=>s[0]!==x&&s[3]!=null&&s[2]>=ayStart&&s[2]<=ayEndCap&&(!subjF||s[3]===subjF)).forEach(s=>{
    const cls=pnClsMap[s[0]+'|'+s[3]]||'?';
    if(!myLessons[`${s[2]}|${s[4]}|${s[3]}|${cls}`]) return;
    coSancW[s[0]]=(coSancW[s[0]]||0)+1;
    if(!coSancSubjs[s[0]])coSancSubjs[s[0]]=new Set();
    coSancSubjs[s[0]].add(s[3]);
  });
  const coEntries=Object.entries(coSancW).map(([px2,w])=>({px:parseInt(px2),w,subjs:[...coSancSubjs[px2]].sort()})).sort((a,b)=>b.w-a.w);

  // Detect groups: lessons where this pupil + 2+ others were all sanctioned
  const pnGroups=[];// [{members:[px,...], count, size}]
  const groupCounts={};// "sorted member list" -> count
  for(const[key] of Object.entries(myLessons)){
    // Find all pupils sanctioned in this same lesson (same date, period, subject, class)
    const others=pSAN.filter(s=>{
      if(s[0]===x||s[3]==null||s[2]<ayStart||s[2]>ayEndCap) return false;
      if(subjF&&s[3]!==subjF) return false;
      const cls=pnClsMap[s[0]+'|'+s[3]]||'?';
      return `${s[2]}|${s[4]}|${s[3]}|${cls}`===key;
    }).map(s=>s[0]);
    const unique=[...new Set(others)];
    if(unique.length>=2){
      const gk=[...unique].sort((a,b)=>a-b).join(',');
      groupCounts[gk]=(groupCounts[gk]||0)+1;
    }
  }
  // Convert to array with names
  const pnGroupData=Object.entries(groupCounts).map(([gk,cnt])=>{
    const members=gk.split(',').map(Number);
    const names=members.map(m=>REG[m]?REG[m].id.replace(/\s*\(P\d+\)\s*$/,''):`#${m}`);
    const label=members.length===2?'Triple':members.length===3?'Quad':members.length===4?'Quintet':'Group of '+(members.length+1);
    return{members,names,count:cnt,size:members.length+1,label};
  }).sort((a,b)=>b.size-a.size||b.count-a.count);

  const container=document.getElementById('pnet-container');

  if(!coEntries.length){
    container.innerHTML=`<div style="color:var(--mu);font-size:.8rem;padding:.5rem 0">No co-sanctions found in ${selAY}-${selAY+1}</div>`;
    return;
  }

  const maxW=Math.max(...coEntries.map(e=>e.w));
  const W2=1050,H2=500;
  const centerR=Math.max(15,Math.min(35,15+mySancCount/10*2));

  const satNodes=coEntries.map((e,i)=>{
    const pu2=REG[e.px];
    const name2=pu2?pu2.id.replace(/\s*\(P\d+\)\s*$/,''):`#${e.px}`;
    const tg2=pu2?curTG(getEn(pu2.intake,e.px)):'—';
    const r2=Math.max(8,Math.min(25,8+e.w/maxW*17));
    const angle=(i/coEntries.length)*Math.PI*2-Math.PI/2;
    const dist2=150+coEntries.length*5;
    return{px:e.px,name:name2,tg:tg2,w:e.w,subjs:e.subjs,r:r2,
      x:W2/2+Math.cos(angle)*Math.min(dist2,W2/2-60),
      y:H2/2+Math.sin(angle)*Math.min(dist2,H2/2-50)};
  });

  const allN=[{px:x,x:W2/2,y:H2/2,r:centerR,fixed:true},...satNodes];
  for(let iter=0;iter<150;iter++){
    const alpha=0.3*(1-iter/150);
    for(let i=1;i<allN.length;i++){
      for(let j=i+1;j<allN.length;j++){
        let dx=allN[j].x-allN[i].x,dy=allN[j].y-allN[i].y,dist=Math.sqrt(dx*dx+dy*dy)||1;
        const minD=allN[i].r+allN[j].r+30;
        if(dist<minD){const f=(minD-dist)*0.5*alpha;allN[i].x-=dx/dist*f;allN[i].y-=dy/dist*f;allN[j].x+=dx/dist*f;allN[j].y+=dy/dist*f}
      }
      allN[i].x=Math.max(allN[i].r+5,Math.min(W2-allN[i].r-5,allN[i].x));
      allN[i].y=Math.max(allN[i].r+20,Math.min(H2-allN[i].r-15,allN[i].y));
    }
  }

  const edgeSvg2=satNodes.map(n=>{
    const sw2=Math.max(1.5,Math.min(8,n.w/maxW*8));
    const op=Math.max(0.3,Math.min(0.85,n.w/maxW));
    return`<line x1="${W2/2}" y1="${H2/2}" x2="${n.x}" y2="${n.y}" stroke="#ef4444" stroke-width="${sw2}" stroke-opacity="${op}"/>`;
  }).join('');

  // Build tooltip data for all nodes
  const pnTipData={};
  // Center node tooltip
  let centerTip=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.4rem;color:var(--tx)">${puName}</div>`;
  centerTip+=`<div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">Sanctions in ${selAY}-${selAY+1}: <b style="color:#6488ff">${mySancCount}</b></div>`;
  if(coEntries.length){
    centerTip+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.4rem;margin-bottom:.2rem">Co-sanctioned with</div>`;
    centerTip+=coEntries.map(e=>{
      const pu2=REG[e.px];const nm=pu2?pu2.id.replace(/\s*\(P\d+\)\s*$/,''):`#${e.px}`;
      return`<div style="font-size:.7rem;display:flex;justify-content:space-between;gap:.8rem;padding:.1rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:var(--tx)">${nm}</span><span style="font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:600">${e.w}×</span></div>`;
    }).join('');
  }
  if(pnGroupData.length){
    centerTip+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.5rem;margin-bottom:.2rem">Groups</div>`;
    pnGroupData.forEach(g=>{
      centerTip+=`<div style="font-size:.68rem;padding:.15rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:#a78bfa;font-weight:600">${g.label}</span> <span style="color:var(--mu)">${g.names.join(', ')}</span> <span style="font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:600">${g.count}×</span></div>`;
    });
  }
  pnTipData[x]=centerTip;

  // Satellite node tooltips
  satNodes.forEach(n=>{
    let h=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.2rem;color:var(--tx)">${n.name}</div>`;
    h+=`<div style="font-size:.68rem;color:var(--mu);margin-bottom:.3rem">${n.tg}</div>`;
    h+=`<div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">Co-sanctioned <b style="color:#ef4444">${n.w}×</b> with ${puName}</div>`;
    h+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.3rem;margin-bottom:.2rem">Subjects</div>`;
    h+=n.subjs.map(s=>`<div style="font-size:.7rem;padding:.1rem 0;color:var(--tx)">${s}</div>`).join('');
    // Groups this satellite is part of
    const satGroups=pnGroupData.filter(g=>g.members.includes(n.px));
    if(satGroups.length){
      h+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.4rem;margin-bottom:.2rem">Groups with ${puName}</div>`;
      satGroups.forEach(g=>{
        const otherNames=g.names.filter(nm=>nm!==n.name);
        h+=`<div style="font-size:.68rem;padding:.15rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:#a78bfa;font-weight:600">${g.label}</span> <span style="color:var(--mu)">${otherNames.join(', ')}</span> <span style="font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:600">${g.count}×</span></div>`;
      });
    }
    pnTipData[n.px]=h;
  });

  const centerSvg=`<circle cx="${W2/2}" cy="${H2/2}" r="${centerR}" fill="#6488ff22" stroke="#6488ff" stroke-width="2" style="cursor:pointer" data-px="${x}" onclick="goP(${x})"/>
  <text x="${W2/2}" y="${H2/2+centerR+12}" fill="var(--tx)" font-size="9" font-family="Outfit" text-anchor="middle" font-weight="600" style="pointer-events:none">${puName}</text>
  <text x="${W2/2}" y="${H2/2+4}" fill="#6488ff" font-size="9" font-family="JetBrains Mono,monospace" text-anchor="middle" font-weight="600" style="pointer-events:none">${mySancCount}</text>`;

  const satSvg=satNodes.map(n=>{
    return`<circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="#f9731622" stroke="#f97316" stroke-width="1.5" style="cursor:pointer" data-px="${n.px}" onclick="goP(${n.px})"/>
    <text x="${n.x}" y="${n.y+n.r+11}" fill="var(--tx)" font-size="7.5" font-family="Outfit" text-anchor="middle" style="pointer-events:none">${n.name}</text>
    <text x="${n.x}" y="${n.y+n.r+19}" fill="var(--mu)" font-size="6" font-family="Outfit" text-anchor="middle" style="pointer-events:none">${n.tg}</text>
    <text x="${n.x}" y="${n.y+3}" fill="#f97316" font-size="7" font-family="JetBrains Mono,monospace" text-anchor="middle" font-weight="600" style="pointer-events:none">${n.w}</text>`;
  }).join('');

  container.innerHTML=`<div style="position:relative">
    <svg id="pnet-svg" viewBox="0 0 ${W2} ${H2}" style="width:100%;max-height:500px;display:block;background:var(--sf2);border-radius:8px">${edgeSvg2}${centerSvg}${satSvg}</svg>

function renderNet(){
  const ctx=window._netCtx;
  if(!ctx) return;
  const selAY=parseInt(document.getElementById('net-ay').value);
  const ayStart=`${selAY}-09-01`,ayEnd=`${selAY+1}-07-31`;
  const netToday=new Date();
  const netTodayISO=`${netToday.getFullYear()}-${String(netToday.getMonth()+1).padStart(2,'0')}-${String(netToday.getDate()).padStart(2,'0')}`;
  const ayEndCap=ayEnd<netTodayISO?ayEnd:netTodayISO;

  const SAN2=(DD.sanctions||[]).filter(s=>ctx.classPupilList.includes(s[0])&&s[3]===ctx.sub&&s[2]>=ayStart&&s[2]<=ayEndCap);
  const classPupsSet=new Set(ctx.classPupilList);

  const lessonMap2={};
  SAN2.forEach(s=>{const key=`${s[2]}|${s[4]}`;if(!lessonMap2[key])lessonMap2[key]=[];lessonMap2[key].push(s[0])});

  const pairW={};
  for(const[,pupils] of Object.entries(lessonMap2)){
    const unique=[...new Set(pupils)];
    if(unique.length<2) continue;
    for(let i=0;i<unique.length;i++) for(let j=i+1;j<unique.length;j++){
      const a=Math.min(unique[i],unique[j]),b=Math.max(unique[i],unique[j]);
      pairW[`${a}|${b}`]=(pairW[`${a}|${b}`]||0)+1;
    }
  }

  const groupIncidents={};
  for(const[,pupils] of Object.entries(lessonMap2)){
    const unique=[...new Set(pupils)].sort((a,b)=>a-b);
    if(unique.length>=2) groupIncidents[unique.join(',')]=(groupIncidents[unique.join(',')]||0)+1;
  }

  const pupilPairs={},pupilGroups={};
  for(const[pk,w] of Object.entries(pairW)){
    const[a,b]=pk.split('|').map(Number);
    const nA=REG[a]?REG[a].id.replace(/\s*\(P\d+\)\s*$/,''):`#${a}`;
    const nB=REG[b]?REG[b].id.replace(/\s*\(P\d+\)\s*$/,''):`#${b}`;
    if(!pupilPairs[a])pupilPairs[a]=[];if(!pupilPairs[b])pupilPairs[b]=[];
    pupilPairs[a].push({px:b,name:nB,count:w});pupilPairs[b].push({px:a,name:nA,count:w});
  }
  for(const px of Object.keys(pupilPairs)) pupilPairs[px].sort((a,b)=>b.count-a.count);
  for(const[gk,cnt] of Object.entries(groupIncidents)){
    const members=gk.split(',').map(Number);if(members.length<3) continue;
    members.forEach(px=>{
      if(!pupilGroups[px])pupilGroups[px]=[];
      pupilGroups[px].push({members:members.filter(m=>m!==px).map(m=>REG[m]?REG[m].id.replace(/\s*\(P\d+\)\s*$/,''):`#${m}`),count:cnt,size:members.length});
    });
  }

  const pupSancCount={};SAN2.forEach(s=>{pupSancCount[s[0]]=(pupSancCount[s[0]]||0)+1});
  const edges=Object.entries(pairW).map(([pk,w])=>{const[a,b]=pk.split('|').map(Number);return{a,b,w}});
  const container=document.getElementById('net-container');

  if(!edges.length){
    container.innerHTML=`<div style="color:var(--mu);font-size:.8rem;padding:.5rem 0">No co-sanctions found in ${selAY}-${selAY+1}</div>`;
    return;
  }

  const maxEdgeW=Math.max(...edges.map(e=>e.w));
  const maxSanc=Math.max(...ctx.classPupilList.map(px=>pupSancCount[px]||0),1);
  const W=1050,H=675;
  const nodes=ctx.classPupilList.map((px,i)=>{
    const pu=REG[px];const name=pu?pu.id.replace(/\s*\(P\d+\)\s*$/,''):`#${px}`;
    const sc=pupSancCount[px]||0;const r=Math.max(8,Math.min(30,8+sc/maxSanc*22));
    const connected=edges.some(e=>e.a===px||e.b===px);
    const angle=(i/ctx.classPupilList.length)*Math.PI*2;
    return{px,name,sc,r,x:W/2+Math.cos(angle)*(W/2-50),y:H/2+Math.sin(angle)*(H/2-50),connected};
  });
  const nodeMap={};nodes.forEach(n=>nodeMap[n.px]=n);

  for(let iter=0;iter<300;iter++){
    const alpha=0.35*(1-iter/300);
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      let dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const minDist=nodes[i].r+nodes[j].r+40;
      if(dist<minDist){const f=(minDist-dist)*0.6*alpha;nodes[i].x-=dx/dist*f;nodes[i].y-=dy/dist*f;nodes[j].x+=dx/dist*f;nodes[j].y+=dy/dist*f}
      const rep=2500*alpha/(dist*dist);
      nodes[i].x-=dx/dist*rep;nodes[i].y-=dy/dist*rep;nodes[j].x+=dx/dist*rep;nodes[j].y+=dy/dist*rep;
    }
    edges.forEach(e=>{
      const nA=nodeMap[e.a],nB=nodeMap[e.b];if(!nA||!nB)return;
      let dx=nB.x-nA.x,dy=nB.y-nA.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(dist-(100-e.w/maxEdgeW*40))*0.03*alpha*(1+e.w/maxEdgeW*2);
      nA.x+=dx/dist*f;nA.y+=dy/dist*f;nB.x-=dx/dist*f;nB.y-=dy/dist*f;
    });
    nodes.forEach(n=>{n.x+=(W/2-n.x)*0.003*alpha;n.y+=(H/2-n.y)*0.003*alpha;n.x=Math.max(n.r+5,Math.min(W-n.r-5,n.x));n.y=Math.max(n.r+25,Math.min(H-n.r-15,n.y))});
  }

  const edgeSvg=edges.map(e=>{const nA=nodeMap[e.a],nB=nodeMap[e.b];if(!nA||!nB)return'';const sw2=Math.max(1.5,Math.min(8,e.w/maxEdgeW*8));const op=Math.max(0.25,Math.min(0.85,e.w/maxEdgeW));return`<line x1="${nA.x}" y1="${nA.y}" x2="${nB.x}" y2="${nB.y}" stroke="#ef4444" stroke-width="${sw2}" stroke-opacity="${op}"/>`}).join('');

  function buildTip(n){
    const col=n.sc===0?'var(--bd)':n.connected?'#f97316':'#6488ff';
    let h=`<div style="font-weight:600;font-size:.8rem;margin-bottom:.4rem;color:var(--tx)">${n.name}</div>`;
    h+=`<div style="font-size:.72rem;color:var(--mu);margin-bottom:.3rem">Sanctions in ${ctx.sub} (${selAY}-${selAY+1}): <b style="color:${col}">${n.sc}</b></div>`;
    const pairs=pupilPairs[n.px];
    if(pairs?.length){
      h+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.4rem;margin-bottom:.2rem">Co-sanctioned with</div>`;
      h+=pairs.map(p=>`<div style="font-size:.7rem;display:flex;justify-content:space-between;gap:.8rem;padding:.1rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:var(--tx)">${p.name}</span><span style="font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:600">${p.count}×</span></div>`).join('');
    }
    const groups=pupilGroups[n.px];
    if(groups?.length){
      const seen=new Set();
      const uq=groups.filter(g=>{const k=g.members.sort().join(',');if(seen.has(k))return false;seen.add(k);return true}).sort((a,b)=>b.size-a.size||b.count-a.count);
      h+=`<div style="font-size:.65rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-top:.5rem;margin-bottom:.2rem">Groups</div>`;
      uq.forEach(g=>{const label=g.size===3?'Triple':g.size===4?'Quad':g.size===5?'Quintet':'Group of '+g.size;h+=`<div style="font-size:.68rem;padding:.15rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:#a78bfa;font-weight:600">${label}</span> <span style="color:var(--mu)">${g.members.join(', ')}</span> <span style="font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:600">${g.count}×</span></div>`});
    }
    if(!pairs?.length&&!n.sc) h+=`<div style="font-size:.7rem;color:var(--mu);font-style:italic">No sanctions</div>`;
    return h;
  }
  const tipData={};nodes.forEach(n=>{tipData[n.px]=buildTip(n)});

  const nodeSvg=nodes.map(n=>{
    const col=n.sc===0?'var(--bd)':n.connected?'#f97316':'#6488ff';const tc=n.sc===0?'var(--mu)':'var(--tx)';
    return`<circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${col}22" stroke="${col}" stroke-width="1.5" style="cursor:pointer" data-px="${n.px}" onclick="goP(${n.px})"/>
    <text x="${n.x}" y="${n.y+n.r+12}" fill="${tc}" font-size="8" font-family="Outfit" text-anchor="middle" style="pointer-events:none">${n.name}</text>
    ${n.sc>0?`<text x="${n.x}" y="${n.y+3.5}" fill="${col}" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle" font-weight="600" style="pointer-events:none">${n.sc}</text>`:''}`;
  }).join('');

  const legend=`<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem;font-size:.65rem;color:var(--mu)">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f9731622;border:1.5px solid #f97316;vertical-align:middle;margin-right:.25rem"></span>Co-sanctioned</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6488ff22;border:1.5px solid #6488ff;vertical-align:middle;margin-right:.25rem"></span>Sanctioned (no pairs)</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sf2);border:1.5px solid var(--bd);vertical-align:middle;margin-right:.25rem"></span>No sanctions</span>
    <span>Node size = sanction count · Line thickness = co-sanction frequency</span>
  </div>`;

  container.innerHTML=`<div style="position:relative">
    <svg id="net-svg" viewBox="0 0 ${W} ${H}" style="width:100%;max-height:675px;display:block;background:var(--sf2);border-radius:8px">${edgeSvg}${nodeSvg}</svg>
    <div id="net-tip" style="display:none;position:absolute;pointer-events:none;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:.7rem;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:400px;z-index:50"></div>
  </div>${legend}<div style="font-size:.6rem;color:var(--mu);margin-top:.3rem">${edges.length} pair${edges.length!==1?'s':''} · ${SAN2.length} sanctions in ${selAY}-${selAY+1}</div>`;

  const svgEl=document.getElementById('net-svg'),tipEl=document.getElementById('net-tip');
  if(svgEl&&tipEl){
    const svgRect=()=>svgEl.getBoundingClientRect();
    svgEl.addEventListener('mousemove',ev=>{
      const circ=ev.target.closest('circle[data-px]');
      if(!circ){tipEl.style.display='none';return}
      const html=tipData[parseInt(circ.getAttribute('data-px'))];
      if(!html){tipEl.style.display='none';return}
      tipEl.innerHTML=html;tipEl.style.display='block';
      const rect=svgRect();let left=ev.clientX-rect.left+15,top=ev.clientY-rect.top+15;
      if(left+400>rect.width) left=ev.clientX-rect.left-415;
      if(top+tipEl.offsetHeight>rect.height) top=Math.max(5,ev.clientY-rect.top-tipEl.offsetHeight-10);
      tipEl.style.left=left+'px';tipEl.style.top=top+'px';
    });
    svgEl.addEventListener('mouseleave',()=>{tipEl.style.display='none'});
  }

// Helper: get all progress rows for a year group in the current academic year
function ygRows(yearGroup,period){
  const results=[];
  for(const[ik,periods]of Object.entries(PRG)){
    const ink=parseInt(ik.slice(1));
    if(!atSchool(ink))continue;
    if(curYG(ink)!==yearGroup)continue;
    if(periods[period])results.push(...periods[period]);
  }
  return results;
}
// Get available periods for a year group (from current intake)
function ygPeriods(yearGroup){
  for(const[ik,periods]of Object.entries(PRG)){
    const ink=parseInt(ik.slice(1));
    if(curYG(ink)===yearGroup)return PER.filter(p=>periods[p]);
  }
  return[];
}
// Get enrolments for a year group
function ygEnrol(yearGroup){
  for(const[ik,enrols]of Object.entries(ENR)){
    const ink=parseInt(ik.slice(1));
    if(curYG(ink)===yearGroup)return enrols;
  }
  return[];
}

// ── SUBJECT VIEW ──
function rSV(){
  const yearGroup=parseInt(document.getElementById('sv-yg').value);
  const sub=document.getElementById('sv-sub').value;
  if(!yearGroup||!sub)return;
  const pp=ygPeriods(yearGroup);if(!pp.length){document.getElementById('sv-cards').innerHTML='<div style="color:var(--mu)">No data for Year '+yearGroup+'</div>';document.getElementById('sv-charts-top').innerHTML='';document.getElementById('sv-charts-bottom').innerHTML='';document.getElementById('sv-alerts').innerHTML='';document.getElementById('sv-title').innerHTML='';document.getElementById('sv-dist-title').innerHTML='';return}
  const nP=pp.length;
  const lp=pp[nP-1],labs=pp.map(p=>PL[PER.indexOf(p)]);
  const lr=ygRows(yearGroup,lp);

  // Helper: avg ability for a set of rows
  function avgAb(rs){const s=rs.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null}
  function avgEf(rs){const v=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null}

  // Current, YoY (3 back), term-on-term (1 back)
  const p3=nP>=4?pp[nP-4]:null,p5=nP>=2?pp[nP-2]:null;
  const lr3=p3?ygRows(yearGroup,p3):null,lr5=p5?ygRows(yearGroup,p5):null;

  const avg=avgAb(lr),avgE=avgEf(lr);
  const avg3=lr3?avgAb(lr3):null,avg5=lr5?avgAb(lr5):null;
  const avgE3=lr3?avgEf(lr3):null,avgE5=lr5?avgEf(lr5):null;
  const aY=avg!=null&&avg3!=null?avg-avg3:null;
  const aT=avg!=null&&avg5!=null?avg-avg5:null;
  const eY=avgE!=null&&avgE3!=null?avgE-avgE3:null;
  const eT=avgE!=null&&avgE5!=null?avgE-avgE5:null;

  // Previous 3 periods for prev2
  const prevP=pp.slice(Math.max(0,nP-4),nP-1).reverse();
  const abPrv=prevP.map(p=>{const rs=ygRows(yearGroup,p);const v=avgAb(rs);return`<span>${PL[PER.indexOf(p)]}: <b>${fN(v)}</b></span>`}).join('');
  const efPrv=prevP.map(p=>{const rs=ygRows(yearGroup,p);const v=avgEf(rs);return`<span>${PL[PER.indexOf(p)]}: <b>${fN(v)}</b></span>`}).join('');

  // Sub-group averages at each point in time (current period)
  function sgAvgAb(flag){const rs=lr.filter(r=>r[flag]);return avgAb(rs)}
  function sgAvgEf(flag){const rs=lr.filter(r=>r[flag]);return avgEf(rs)}
  const sendAb=sgAvgAb(4),ehcpAb=sgAvgAb(5),fsmAb=sgAvgAb(6);
  const sendEf=sgAvgEf(4),ehcpEf=sgAvgEf(5),fsmEf=sgAvgEf(6);
  const sendN=lr.filter(r=>r[4]).length,ehcpN=lr.filter(r=>r[5]).length,fsmN=lr.filter(r=>r[6]).length;

  function sgLine(label,color,abV,efV,n,isAbCard){
    if(!n)return'';
    const v=isAbCard?abV:efV;
    const max=isAbCard?7:4;
    const col=isAbCard?aC(v):eC(v);
    return`<div style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;margin-top:.1rem"><span style="font-weight:600;color:${color};min-width:2.8rem">${label}</span><span style="font-family:'JetBrains Mono',monospace;color:${col};font-weight:500">${fN(v)}<span style="color:var(--mu);font-size:.65rem">/${max}</span></span><span style="color:var(--mu);font-size:.65rem">(n=${n})</span></div>`;
  }
  const sgBlockAb=`<div style="border-top:1px solid var(--bd);margin-top:.5rem;padding-top:.4rem">${sgLine('SEND','#f97316',sendAb,sendEf,sendN,true)}${sgLine('EHCP','#a78bfa',ehcpAb,ehcpEf,ehcpN,true)}${sgLine('FSM','#6488ff',fsmAb,fsmEf,fsmN,true)}</div>`;
  const sgBlockEf=`<div style="border-top:1px solid var(--bd);margin-top:.5rem;padding-top:.4rem">${sgLine('SEND','#f97316',sendAb,sendEf,sendN,false)}${sgLine('EHCP','#a78bfa',ehcpAb,ehcpEf,ehcpN,false)}${sgLine('FSM','#6488ff',fsmAb,fsmEf,fsmN,false)}</div>`;

  // ── Alerts ──
  // Helper: get a row for a specific pupil index in a period
  function getRow(p,idx){return(ygRows(yearGroup,p)||[]).find(r=>r[0]===idx)||null}

  // Flags for each pupil in current period
  const flagBadge2=(r)=>[r[4]?'<span style="font-size:.6rem;font-weight:600;color:#f97316">SEN</span>':'',r[5]?'<span style="font-size:.6rem;font-weight:600;color:#a78bfa">EHC</span>':'',r[6]?'<span style="font-size:.6rem;font-weight:600;color:#6488ff">FSM</span>':''].filter(Boolean).join(' ');

  function abVal(r){return r&&r[3][sub]?AS[AM[r[3][sub][0]]]||0:0}
  function efVal(r){return r&&r[3][sub]?r[3][sub][1]||0:0}

  // Term-on-term: compare lp vs p5 (1 period back)
  // Year-on-year: compare lp vs p3 (3 periods back)
  function concerns(metric,cur,prev,threshold){
    if(!prev)return[];
    const valFn=metric==='ab'?abVal:efVal;
    return cur.map(r=>{
      const pr=getRow(prev,r[0]);
      if(!pr)return null;
      const cv=valFn(r),pv=valFn(pr);
      if(cv<=0||pv<=0)return null;
      const diff=cv-pv;
      if(diff<=-threshold)return{idx:r[0],pid:r[1],cur:cv,prev:pv,diff,flags:r};
      return null;
    }).filter(Boolean).sort((a,b)=>a.diff-b.diff);
  }

  const abTT=concerns('ab',lr,p5,CT_AB);
  const abYoY=concerns('ab',lr,p3,CT_AB);
  const efTT=concerns('ef',lr,p5,CT_EF);
  const efYoY=concerns('ef',lr,p3,CT_EF);

  // Academic Year discipline: sanctions from start of AY to today for this subject, top 5 pupils
  // Restrict to pupils actually in this year group (from lr)
  const lrIdxSet=new Set(lr.map(r=>r[0]));
  const aySancStart2=`${CAY}-09-01`;
  const todaySV=new Date();
  const todaySVISO=`${todaySV.getFullYear()}-${String(todaySV.getMonth()+1).padStart(2,'0')}-${String(todaySV.getDate()).padStart(2,'0')}`;
  const termSancs=(DD.sanctions||[]).filter(s=>s[3]===sub&&s[2]>=aySancStart2&&s[2]<=todaySVISO&&lrIdxSet.has(s[0]));
  const sancCounts={};
  const sancRawCounts={};
  termSancs.forEach(s=>{sancCounts[s[0]]=(sancCounts[s[0]]||0)+sancWeight(s[1]);sancRawCounts[s[0]]=(sancRawCounts[s[0]]||0)+1});
  const top5Sanc=Object.entries(sancCounts).filter(([idx])=>(sancRawCounts[idx]||0)>=CT_MN).map(([idx,n])=>{
    const r=lr.find(r=>r[0]===parseInt(idx));
    const pid=r?r[1]:(REG[idx]?REG[idx].id:`#${idx}`);
    return{idx:parseInt(idx),pid,n,flags:r||null};
  }).sort((a,b)=>b.n-a.n);

  function abLabel(v){const n=['Bel','Dev','Wrk','Met','Con','Skl','Exc'];return v>=1&&v<=7?n[v-1]:v}

  // Helper: get class/teacher for a pupil in this subject

  // Grade breakdown with bar chart

  const maxGradeCount=Math.max(...[...AN].map(g=>lr.filter(r=>r[3][sub]&&AM[r[3][sub][0]]===g).length),1);

  // Section title
  document.getElementById('sv-title').innerHTML=`<div style="font-size:.85rem;font-weight:600;color:var(--tx);text-transform:uppercase;letter-spacing:.06em;padding-top:.8rem;border-top:1px solid var(--bd)">Y${yearGroup} ${sub} Report Breakdown</div>`;

  document.getElementById('sv-cards').innerHTML=`
    <div class="crd"><div class="ct2">${sub} Avg Ability (Y${yearGroup} · ${PL[PER.indexOf(lp)]})</div>
      <div style="display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap"><span class="cv2" style="color:${aC(avg)}">${fN(avg)}<span style="font-size:.8rem;color:var(--mu)">/7</span></span></div>
      <div style="display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.4rem">${chB(aY,'Year-on-Year')}${chB(aT,'This Term')}</div>

      ${sgBlockAb}
    </div>
    <div class="crd g"><div class="ct2">${sub} Avg Effort (Y${yearGroup} · ${PL[PER.indexOf(lp)]})</div>
      <div style="display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap"><span class="cv2" style="color:${eC(avgE)}">${fN(avgE)}<span style="font-size:.8rem;color:var(--mu)">/4</span></span></div>
      <div style="display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.4rem">${chB(eY,'Year-on-Year')}${chB(eT,'This Term')}</div>
      <div class="prev2" style="margin-top:.4rem">${efPrv}</div>
      ${sgBlockEf}
    </div>
    <div class="crd"><div class="ct2">Grade Breakdown</div><div style="display:flex;flex-direction:column;gap:.25rem;margin-top:.25rem">${gradeRows}</div></div>
    <div class="crd"><div class="ct2">Effort Breakdown</div><div style="display:flex;flex-direction:column;gap:.25rem;margin-top:.25rem">${efRows}</div></div>`;

  dc('svab');dc('svef');dc('svst');dc('svefst');
  document.getElementById('sv-charts-top').innerHTML=`<div class="chc"><div class="cht">${sub} Ability Over Time (Y${yearGroup})</div><div class="chw"><canvas id="c-svab"></canvas></div></div><div class="chc"><div class="cht">${sub} Effort Over Time</div><div class="chw"><canvas id="c-svef"></canvas></div></div>`;

  // Distribution section title
  document.getElementById('sv-dist-title').innerHTML=`<div style="font-size:.85rem;font-weight:600;color:var(--tx);text-transform:uppercase;letter-spacing:.06em;padding-top:.8rem;border-top:1px solid var(--bd)">Distribution Over Time</div>`;

  document.getElementById('sv-charts-bottom').innerHTML=`<div class="chc full"><div class="cht">Ability Distribution Over Time (Stacked %)</div><div class="chw" style="height:clamp(250px,20vw,380px)"><canvas id="c-svst"></canvas></div></div><div class="chc full"><div class="cht">Effort Distribution Over Time (Stacked %)</div><div class="chw" style="height:clamp(250px,20vw,380px)"><canvas id="c-svefst"></canvas></div></div>`;

  // Build per-period data points for all pupils and each sub-group
  function ptAb(p,flag){const rs=ygRows(yearGroup,p).filter(r=>flag==null||r[flag]);const s=rs.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);return s.length?parseFloat((s.reduce((a,b)=>a+b,0)/s.length).toFixed(2)):null}
  function ptEf(p,flag){const rs=ygRows(yearGroup,p).filter(r=>flag==null||r[flag]);const v=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);return v.length?parseFloat((v.reduce((a,b)=>a+b,0)/v.length).toFixed(2)):null}

  const abAll=pp.map(p=>ptAb(p,null));
  const abSend=pp.map(p=>ptAb(p,4)),abEhcp=pp.map(p=>ptAb(p,5)),abFsm=pp.map(p=>ptAb(p,6));
  const efAll=pp.map(p=>ptEf(p,null));
  const efSend=pp.map(p=>ptEf(p,4)),efEhcp=pp.map(p=>ptEf(p,5)),efFsm=pp.map(p=>ptEf(p,6));

  const hasSend=abSend.some(v=>v!=null),hasEhcp=abEhcp.some(v=>v!=null),hasFsm=abFsm.some(v=>v!=null);

  const mkSub=(label,data,color)=>({label,data,borderColor:color,backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,3],pointRadius:3,pointStyle:'triangle',tension:.4,fill:false,spanGaps:true});

  const abDatasets=[
    {label:'All',data:abAll,borderColor:'#6488ff',backgroundColor:'#6488ff22',borderWidth:2.5,pointRadius:4,tension:.4,fill:true,spanGaps:true},
    ...(hasSend?[mkSub('SEND',abSend,'#f97316')]:[]),
    ...(hasEhcp?[mkSub('EHCP',abEhcp,'#a78bfa')]:[]),
    ...(hasFsm?[mkSub('FSM',abFsm,'#38bdf8')]:[]),
  ];
  const efDatasets=[
    {label:'All',data:efAll,borderColor:'#34d399',backgroundColor:'#34d39922',borderWidth:2.5,pointRadius:4,tension:.4,fill:true,spanGaps:true},
    ...(hasSend?[mkSub('SEND',efSend,'#f97316')]:[]),
    ...(hasEhcp?[mkSub('EHCP',efEhcp,'#a78bfa')]:[]),
    ...(hasFsm?[mkSub('FSM',efFsm,'#38bdf8')]:[]),
  ];

  // Dynamic y-axis range to include sub-group lines
  const allAbV=[...abAll,...abSend,...abEhcp,...abFsm].filter(v=>v!=null);
  const abYMin=allAbV.length?Math.max(0.5,Math.floor((Math.min(...allAbV)-0.3)*10)/10):0.5;
  const abYMax=allAbV.length?Math.min(7.5,Math.ceil((Math.max(...allAbV)+0.3)*10)/10):7.5;
  const allEfV=[...efAll,...efSend,...efEhcp,...efFsm].filter(v=>v!=null);
  const efYMin=allEfV.length?Math.max(0.5,Math.floor((Math.min(...allEfV)-0.3)*10)/10):0.5;
  const efYMax=allEfV.length?Math.min(4.5,Math.ceil((Math.max(...allEfV)+0.3)*10)/10):4.5;

  const showLegend={labels:{color:'#7a85a0',font:{family:'Outfit',size:9},boxWidth:8,padding:8}};

  sc2('svab',new Chart(document.getElementById('c-svab'),{type:'line',data:{labels:labs,datasets:abDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:showLegend},scales:{y:{min:abYMin,max:abYMax,ticks:{color:'#7a85a0',font:{size:8},stepSize:1,callback:v=>{const n=['Bel','Dev','Wrk','Met','Con','Skl','Exc'];return Number.isInteger(v)&&v>=1&&v<=7?n[v-1]:''}},grid:{color:'#262d4422'},border:{color:'#262d44'}},x:{ticks:{color:'#7a85a0'},grid:{display:false},border:{color:'#262d44'}}}}}));
  sc2('svef',new Chart(document.getElementById('c-svef'),{type:'line',data:{labels:labs,datasets:efDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:showLegend},scales:{y:{min:efYMin,max:efYMax,ticks:{color:'#7a85a0',stepSize:1},grid:{color:'#262d4422'},border:{color:'#262d44'}},x:{ticks:{color:'#7a85a0'},grid:{display:false},border:{color:'#262d44'}}}}}));
  sc2('svst',new Chart(document.getElementById('c-svst'),{type:'bar',data:{labels:labs,datasets:AN.map(g=>({label:g,data:pp.map(p=>{const rs=ygRows(yearGroup,p);const tot=rs.filter(r=>r[3][sub]).length;return tot?parseFloat((rs.filter(r=>r[3][sub]&&AM[r[3][sub][0]]===g).length/tot*100).toFixed(1)):0}),backgroundColor:GC[g],borderRadius:2,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a85a0',font:{family:'Outfit'},boxWidth:10,padding:8}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{stacked:true,ticks:{color:'#7a85a0'},grid:{color:'#262d4422'},border:{color:'#262d44'}},y:{stacked:true,max:100,ticks:{color:'#7a85a0',callback:v=>v+'%'},grid:{color:'#262d4422'},border:{color:'#262d44'}}}}}));

  const effortColors2={'1':'#ef4444','2':'#f97316','3':'#38bdf8','4':'#34d399'};
  const effortLabels2=['1 — Low','2 — Developing','3 — Good','4 — Excellent'];
  sc2('svefst',new Chart(document.getElementById('c-svefst'),{type:'bar',data:{labels:labs,datasets:[1,2,3,4].map(e=>({label:effortLabels2[e-1],data:pp.map(p=>{const rs=ygRows(yearGroup,p);const tot=rs.filter(r=>r[3][sub]&&r[3][sub][1]>=1&&r[3][sub][1]<=4).length;return tot?parseFloat((rs.filter(r=>r[3][sub]&&r[3][sub][1]===e).length/tot*100).toFixed(1)):0}),backgroundColor:effortColors2[e]+'cc',borderRadius:2,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a85a0',font:{family:'Outfit'},boxWidth:10,padding:8}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{stacked:true,ticks:{color:'#7a85a0'},grid:{color:'#262d4422'},border:{color:'#262d44'}},y:{stacked:true,max:100,ticks:{color:'#7a85a0',callback:v=>v+'%'},grid:{color:'#262d4422'},border:{color:'#262d44'}}}}}));
}

// ── CLASS VIEW ──
function popCL(){
  const yearGroup=parseInt(document.getElementById('cl-yg').value);
  const sub=document.getElementById('cl-sub').value;
  if(!yearGroup||!sub)return;
  const enrols=ygEnrol(yearGroup);
  const classes=new Set();
  const classTeacher={};
  enrols.filter(r=>r.t==='cls'&&r.s===sub&&r.u===null).forEach(r=>{classes.add(r.c);classTeacher[r.c]=r.tc});
  const sel=document.getElementById('cl-cls');const pv=sel.value;sel.innerHTML='';
  [...classes].sort((a,b)=>a-b).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=`Class ${c} — ${classTeacher[c]||''}`;sel.appendChild(o)});
  if([...classes].map(String).includes(pv))sel.value=pv;
  rCL();
}

function rCL(){
  const yearGroup=parseInt(document.getElementById('cl-yg').value);
  const sub=document.getElementById('cl-sub').value;
  const cl=parseInt(document.getElementById('cl-cls').value);
  if(!yearGroup||!sub||!cl)return;
  const pp=ygPeriods(yearGroup);if(!pp.length){document.getElementById('cl-cards').innerHTML='<div style="color:var(--mu)">No data for Year '+yearGroup+'</div>';document.getElementById('cl-charts').innerHTML='';document.getElementById('cl-alerts').innerHTML='';document.getElementById('cl-network').innerHTML='';document.getElementById('cl-title').innerHTML='';document.getElementById('cl-send-title').innerHTML='';document.getElementById('cl-send').innerHTML='';document.getElementById('cl-perf-title').innerHTML='';return}
  const nP=pp.length;
  const lp=pp[nP-1],labs=pp.map(p=>PL[PER.indexOf(p)]);

  // Pupils currently in this class
  const enrols=ygEnrol(yearGroup);
  const classPups=new Set(enrols.filter(r=>r.t==='cls'&&r.s===sub&&r.c===cl&&r.u===null).map(r=>r.x));
  const teacher=enrols.find(r=>r.t==='cls'&&r.s===sub&&r.c===cl&&r.u===null)?.tc||'';
  if(!classPups.size){document.getElementById('cl-cards').innerHTML='<div style="color:var(--mu)">No pupils in class</div>';return}

  // Filter all row lookups to class pupils
  const clRows=(p)=>ygRows(yearGroup,p).filter(r=>classPups.has(r[0]));
  const lr=clRows(lp);

  function avgAb(rs){const s=rs.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null}
  function avgEf(rs){const v=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null}

  const p3=nP>=4?pp[nP-4]:null,p5=nP>=2?pp[nP-2]:null;
  const lr3=p3?clRows(p3):null,lr5=p5?clRows(p5):null;

  const avg=avgAb(lr),avgE=avgEf(lr);
  const avg3=lr3?avgAb(lr3):null,avg5=lr5?avgAb(lr5):null;
  const avgE3=lr3?avgEf(lr3):null,avgE5=lr5?avgEf(lr5):null;
  const aY=avg!=null&&avg3!=null?avg-avg3:null;
  const aT=avg!=null&&avg5!=null?avg-avg5:null;
  const eY=avgE!=null&&avgE3!=null?avgE-avgE3:null;
  const eT=avgE!=null&&avgE5!=null?avgE-avgE5:null;

  const prevP=pp.slice(Math.max(0,nP-4),nP-1).reverse();
  const abPrv=prevP.map(p=>{const rs=clRows(p);const v=avgAb(rs);return`<span>${PL[PER.indexOf(p)]}: <b>${fN(v)}</b></span>`}).join('');
  const efPrv=prevP.map(p=>{const rs=clRows(p);const v=avgEf(rs);return`<span>${PL[PER.indexOf(p)]}: <b>${fN(v)}</b></span>`}).join('');

  function sgAvgAb(flag){return avgAb(lr.filter(r=>r[flag]))}
  function sgAvgEf(flag){return avgEf(lr.filter(r=>r[flag]))}
  const sendAb=sgAvgAb(4),ehcpAb=sgAvgAb(5),fsmAb=sgAvgAb(6);
  const sendEf=sgAvgEf(4),ehcpEf=sgAvgEf(5),fsmEf=sgAvgEf(6);
  const sendN=lr.filter(r=>r[4]).length,ehcpN=lr.filter(r=>r[5]).length,fsmN=lr.filter(r=>r[6]).length;

  function sgLine(label,color,abV,efV,n,isAbCard){
    if(!n)return'';
    const v=isAbCard?abV:efV;const max=isAbCard?7:4;const col=isAbCard?aC(v):eC(v);
    return`<div style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;margin-top:.1rem"><span style="font-weight:600;color:${color};min-width:2.8rem">${label}</span><span style="font-family:'JetBrains Mono',monospace;color:${col};font-weight:500">${fN(v)}<span style="color:var(--mu);font-size:.65rem">/${max}</span></span><span style="color:var(--mu);font-size:.65rem">(n=${n})</span></div>`;
  }
  const sgBlockAb=`<div style="border-top:1px solid var(--bd);margin-top:.5rem;padding-top:.4rem">${sgLine('SEND','#f97316',sendAb,sendEf,sendN,true)}${sgLine('EHCP','#a78bfa',ehcpAb,ehcpEf,ehcpN,true)}${sgLine('FSM','#6488ff',fsmAb,fsmEf,fsmN,true)}</div>`;
  const sgBlockEf=`<div style="border-top:1px solid var(--bd);margin-top:.5rem;padding-top:.4rem">${sgLine('SEND','#f97316',sendAb,sendEf,sendN,false)}${sgLine('EHCP','#a78bfa',ehcpAb,ehcpEf,ehcpN,false)}${sgLine('FSM','#6488ff',fsmAb,fsmEf,fsmN,false)}</div>`;

  // Alerts
  function getClRow(p,idx){return clRows(p).find(r=>r[0]===idx)||null}
  const flagBadge2=(r)=>[r[4]?'<span style="font-size:.6rem;font-weight:600;color:#f97316">SEN</span>':'',r[5]?'<span style="font-size:.6rem;font-weight:600;color:#a78bfa">EHC</span>':'',r[6]?'<span style="font-size:.6rem;font-weight:600;color:#6488ff">FSM</span>':''].filter(Boolean).join(' ');

  // Helper: get TG for a pupil
  function pupilTG(idx){
    const tgRec=enrols.filter(r=>r.t==='tg'&&r.x===idx&&r.u===null);
    return tgRec.length?tgRec[tgRec.length-1].v:'—';
  }
  function abVal(r){return r&&r[3][sub]?AS[AM[r[3][sub][0]]]||0:0}
  function efVal(r){return r&&r[3][sub]?r[3][sub][1]||0:0}
  function concerns(metric,cur,prevP2,threshold){
    if(!prevP2)return[];
    const valFn=metric==='ab'?abVal:efVal;
    return cur.map(r=>{
      const pr=getClRow(prevP2,r[0]);if(!pr)return null;
      const cv=valFn(r),pv=valFn(pr);
      if(cv<=0||pv<=0)return null;

// ── CLASS COMPARISON ──
function rCC(){
  const yearGroup=parseInt(document.getElementById('cc-yg').value);
  const sub=document.getElementById('cc-sub').value;
  if(!yearGroup||!sub)return;
  const enrols=ygEnrol(yearGroup);
  const cm={};enrols.filter(r=>r.t==='cls'&&r.s===sub&&r.u===null).forEach(r=>{if(!cm[r.c])cm[r.c]={pups:new Set(),tc:r.tc};cm[r.c].pups.add(r.x)});
  const pp=ygPeriods(yearGroup);if(!pp.length)return;
  const lp=pp[pp.length-1],p3=pp.length>=4?pp[pp.length-4]:null;

  const rows=Object.entries(cm).sort(([a],[b])=>a-b).map(([c,info])=>{
    const lr=ygRows(yearGroup,lp).filter(r=>info.pups.has(r[0]));
    const sc2r=lr.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);
    const avg=sc2r.length?sc2r.reduce((a,b)=>a+b,0)/sc2r.length:null;
    const ev=lr.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);
    const avgE=ev.length?ev.reduce((a,b)=>a+b,0)/ev.length:null;
    let pAvg=null,pAvgE=null;if(p3){const pr=ygRows(yearGroup,p3).filter(r=>info.pups.has(r[0]));const ps2=pr.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);pAvg=ps2.length?ps2.reduce((a,b)=>a+b,0)/ps2.length:null;const pe2=pr.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);pAvgE=pe2.length?pe2.reduce((a,b)=>a+b,0)/pe2.length:null}
    const chg=avg!=null&&pAvg!=null?avg-pAvg:null;
    const chgS=chg===null?'color:var(--mu)':chg>0?'color:#34d399':chg<=-1?'color:#ef4444;font-weight:600':chg<0?'color:#ef4444':'';
    const chgE=avgE!=null&&pAvgE!=null?avgE-pAvgE:null;
    const chgES=chgE===null?'color:var(--mu)':chgE>0?'color:#34d399':chgE<=-1?'color:#ef4444;font-weight:600':chgE<0?'color:#ef4444':'';
    const sendC=lr.filter(r=>r[4]).length,ehcpC=lr.filter(r=>r[5]).length,fsmC=lr.filter(r=>r[6]).length;
    const pupSetC=new Set(info.pups);
    const SAN_ALL=DD.sanctions||[];
    const _ccToday=new Date();
    const _ccTodayISO=`${_ccToday.getFullYear()}-${String(_ccToday.getMonth()+1).padStart(2,'0')}-${String(_ccToday.getDate()).padStart(2,'0')}`;
    const ayStartC=`${CAY}-09-01`;
    const clsSanc=SAN_ALL.filter(s=>pupSetC.has(s[0])&&s[2]>=ayStartC&&s[2]<=_ccTodayISO&&s[3]===sub);
    const clsCodes=clsSanc.filter(s=>s[1]===0).length;
    const clsOnCalls=clsSanc.filter(s=>s[1]===1).length;
    const clsDetentions=clsSanc.filter(s=>s[1]===2).length;

    // Expected sanctions: based on each pupil's overall sanction rate × timetable proportion for this subject
    let expCodes=0,expOnCalls=0,expDets=0;
    for(const px of info.pups){
      // Count this pupil's total AY lesson sanctions (exclude non-lesson)
      const pAllSanc=SAN_ALL.filter(s=>s[0]===px&&s[2]>=ayStartC&&s[2]<=_ccTodayISO&&s[3]!=null);
      const pCodes=pAllSanc.filter(s=>s[1]===0).length;
      const pOnCalls=pAllSanc.filter(s=>s[1]===1).length;
      const pDets=pAllSanc.filter(s=>s[1]===2).length;
      // Count timetable slots for this subject vs total
      const grid=TT_DATA[String(px)];
      if(!grid) continue;
      let subjSlots=0,totalSlots=0;
      for(let d=0;d<5;d++) for(let p=0;p<5;p++){
        if(grid[d][p]){totalSlots++;if(grid[d][p][0]===sub) subjSlots++}
      }
      if(totalSlots===0) continue;
      const proportion=subjSlots/totalSlots;
      expCodes+=pCodes*proportion;
      expOnCalls+=pOnCalls*proportion;
      expDets+=pDets*proportion;
    }
    const eCodes=Math.round(expCodes*10)/10;
    const eOnCalls=Math.round(expOnCalls*10)/10;
    const eDets=Math.round(expDets*10)/10;
    const dotC=clsCodes>eCodes?'#ef4444':clsCodes<eCodes?'#34d399':'var(--mu)';
    const dotO=clsOnCalls>eOnCalls?'#ef4444':clsOnCalls<eOnCalls?'#34d399':'var(--mu)';
    const dotD=clsDetentions>eDets?'#ef4444':clsDetentions<eDets?'#34d399':'var(--mu)';
    const dot=(col)=>`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${col};vertical-align:middle;margin-left:.3rem"></span>`;

    return`<tr><td>Class ${c}</td><td>${info.tc}</td><td>${info.pups.size}</td><td style="font-weight:600;color:${aC(avg)}">${fV(avg,2)}</td><td style="font-weight:600;color:${eC(avgE)}">${fV(avgE,2)}</td><td style="${chgS}">${chg!=null?(chg>0?'+':'')+chg.toFixed(2):'—'}</td><td style="${chgES}">${chgE!=null?(chgE>0?'+':'')+chgE.toFixed(2):'—'}</td><td style="text-align:center;${sendC?'color:#f97316;font-weight:600':'color:var(--mu)'}">${sendC||'—'}</td><td style="text-align:center;${ehcpC?'color:#a78bfa;font-weight:600':'color:var(--mu)'}">${ehcpC||'—'}</td><td style="text-align:center;${fsmC?'color:#6488ff;font-weight:600':'color:var(--mu)'}">${fsmC||'—'}</td><td style="text-align:center;${clsCodes?'color:#f97316;font-weight:600':'color:var(--mu)'}">${clsCodes||'—'}</td><td style="text-align:center;color:var(--mu)">${eCodes}${dot(dotC)}</td><td style="text-align:center;${clsOnCalls?'color:#ef4444;font-weight:600':'color:var(--mu)'}">${clsOnCalls||'—'}</td><td style="text-align:center;color:var(--mu)">${eOnCalls}${dot(dotO)}</td><td style="text-align:center;${clsDetentions?'color:#7c3aed;font-weight:600':'color:var(--mu)'}">${clsDetentions||'—'}</td><td style="text-align:center;color:var(--mu)">${eDets}${dot(dotD)}</td></tr>`}).join('');

  document.getElementById('cc-out').innerHTML=`<div class="dw"><div class="dwt">${sub} — Class Comparison Y${yearGroup} (${PL[PER.indexOf(lp)]})</div><div style="font-size:.62rem;color:var(--mu);margin-bottom:.5rem">Expected = each pupil's overall sanction rate × their timetable proportion for ${sub}. <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ef4444;vertical-align:middle"></span> Actual > Expected <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#34d399;vertical-align:middle;margin-left:.4rem"></span> Actual < Expected</div><table class="d"><thead><tr><th>Class</th><th>Teacher</th><th>#</th><th>Avg Ab.</th><th>Avg Ef.</th><th>Ab. Δ</th><th>Ef. Δ</th><th style="color:#f97316">SEND</th><th style="color:#a78bfa">EHCP</th><th style="color:#6488ff">FSM</th><th style="color:#f97316">Codes</th><th style="color:#f97316">Exp.</th><th style="color:#ef4444">On-Calls</th><th style="color:#ef4444">Exp.</th><th style="color:#7c3aed">Det.</th><th style="color:#7c3aed">Exp.</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

})();

  // Expose functions called from HTML attributes to global scope
  window.sw=sw;

  window.popCL=popCL;
  window.rCmp=rCmp;
  window.rPrg=rPrg;
  window.rCC=rCC;
  window.rTV=rTV;
  window.rBC=rBC;
  window.rPP=rPP;
  window.rSEND=rSEND;
  window.renderNet=renderNet;
  window.renderPupilNet=renderPupilNet;
  window.renderDistCharts=renderDistCharts;
  window.popBCTG=popBCTG;
  window.goP=goP;
  window.applyCT=applyCT;
  window.showCTModal=showCTModal;
  window.hideCTModal=hideCTModal;
  window.applySW=applySW;
  window.showSWModal=showSWModal;
  window.hideSWModal=hideSWModal;
  window.toggleAll=toggleAll;

})(); // end async boot
