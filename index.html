function peerFilterPupils(filters){
  const {intake,fsm,ehcp,send,gender,subject,attband}=filters;
  const ik=`I${intake}`;
  const pp2=ygPeriods(curYG(intake));
  if(!pp2.length) return{pupils:[],periods:pp2};
  const lp=pp2[pp2.length-1];
  const lr=ygRows(curYG(intake),lp);
  const WLK=DD.weekLessons||{};
  const ayStart=`${intake}-09-01`;
  const _pToday=new Date();
  const _pTodayISO=`${_pToday.getFullYear()}-${String(_pToday.getMonth()+1).padStart(2,'0')}-${String(_pToday.getDate()).padStart(2,'0')}`;

  let filtered=lr.filter(r=>{
    const px=r[0];
    const pu=REG[String(px)];
    if(!pu||pu.left) return false;

    // Gender
    if(gender!=='any'&&pu.gender!==gender) return false;
    // SEND/EHCP/FSM flags from progress row
    if(send==='Y'&&!r[4]) return false;
    if(send==='N'&&r[4]) return false;
    if(send==='K'&&SEN_STATUS[String(px)]!=='K') return false;
    if(send==='E'&&SEN_STATUS[String(px)]!=='E') return false;
    if(send==='Add'&&SEN_STATUS[String(px)]!=='Add'&&SEN_STATUS[String(px)]!=='add') return false;
    if(send==='Strat'&&SEN_STATUS[String(px)]!=='Strat'&&SEN_STATUS[String(px)]!=='strat') return false;
    if(send==='Ncode'&&SEN_STATUS[String(px)]!=='N') return false;
    if(ehcp==='Y'&&!r[5]) return false;
    if(ehcp==='N'&&r[5]) return false;
    if(fsm==='Y'&&!r[6]) return false;
    if(fsm==='N'&&r[6]) return false;

    // Attendance band
    if(attband!=='any'){
      let attPct;
      if(subject==='all'){
        // Overall YTD attendance
        const pAbs=(DD.attendance||{})[String(px)]||[];
        const ytdAbs=pAbs.filter(d=>d>=ayStart&&d<=_pTodayISO).length;
        let ytdTotal=0;
        for(const[w,tl] of Object.entries(WLK)){if(w>=ayStart&&w<=_pTodayISO)ytdTotal+=tl}
        attPct=ytdTotal>0?((ytdTotal-ytdAbs)/ytdTotal*100):100;
      }else{
        // Subject-specific YTD attendance
        const subjAbps=(ABPS[String(px)]||{});
        const ayPeriods2=pp2.filter(p=>parseInt(p.split(' ')[1])===intake);
        const sVals=ayPeriods2.map(p=>subjAbps[p]?.[subject]).filter(v=>v!=null);
        attPct=sVals.length?(sVals.reduce((a,b)=>a+b,0)/sVals.length):100;
      }
      if(attband==='100'&&attPct<100) return false;
      if(attband==='97-99'&&(attPct<97||attPct>=100)) return false;
      if(attband==='95-97'&&(attPct<95||attPct>=97)) return false;
      if(attband==='90-95'&&(attPct<90||attPct>=95)) return false;
      if(attband==='85-90'&&(attPct<85||attPct>=90)) return false;
      if(attband==='lt85'&&attPct>=85) return false;
    }
    return true;
  });

  return{pupils:filtered,periods:pp2,intake,subject};
}

function peerComputeSeries(result){
  const {pupils,periods,intake,subject}=result;
  const ik=`I${intake}`;
  const WLK=DD.weekLessons||{};

  const abData=[],efData=[],attData=[];
  const labs=[];

  periods.forEach(p=>{
    labs.push(PL[PER.indexOf(p)]||p);
    const pRows=(PRG[ik]||{})[p]||[];
    const pxSet=new Set(pupils.map(r=>r[0]));

    // Ability & Effort averages
    let abSum=0,abN=0,efSum=0,efN=0;
    pRows.forEach(r=>{
      if(!pxSet.has(r[0])) return;
      if(subject==='all'){
        SUBS.forEach(s=>{
          if(r[3][s]){
            const a=AS[AM[r[3][s][0]]]||0;if(a>0){abSum+=a;abN++}
            const e=r[3][s][1];if(e>0){efSum+=e;efN++}
          }
        });
      }else{
        if(r[3][subject]){
          const a=AS[AM[r[3][subject][0]]]||0;if(a>0){abSum+=a;abN++}
          const e=r[3][subject][1];if(e>0){efSum+=e;efN++}
        }
      }
    });
    abData.push(abN?abSum/abN:null);
    efData.push(efN?efSum/efN:null);

    // Attendance for this period
    const pa=p.split(' ');const t=pa[0];const ay=parseInt(pa[1]);
    let ps2,pe;
    if(t==='T1'){ps2=`${ay}-09-01`;pe=`${ay}-12-31`}
    else if(t==='T2'){ps2=`${ay+1}-01-01`;pe=`${ay+1}-03-31`}
    else{ps2=`${ay+1}-04-01`;pe=`${ay+1}-07-31`}
    const _pt=new Date();const _ptISO=`${_pt.getFullYear()}-${String(_pt.getMonth()+1).padStart(2,'0')}-${String(_pt.getDate()).padStart(2,'0')}`;
    const peCap=pe<_ptISO?pe:_ptISO;
    if(ps2>_ptISO){attData.push(null);return}

    let tl=0;for(const[w,v] of Object.entries(WLK)){if(w>=ps2&&w<=peCap)tl+=v}
    if(!tl){attData.push(null);return}
    let totalAbs=0;
    pupils.forEach(r=>{
      const abs2=(DD.attendance||{})[String(r[0])]||[];
      totalAbs+=abs2.filter(d=>d>=ps2&&d<=peCap).length;
    });
    const totalL=tl*pupils.length;
    attData.push(totalL>0?parseFloat(((totalL-totalAbs)/totalL*100).toFixed(1)):null);
  });

  return{labs,abData,efData,attData};
}

function peerLabel(filters,count){
  const parts=[];
  parts.push(`Y${curYG(filters.intake)}`);
  if(filters.gender!=='any') parts.push(filters.gender==='M'?'Male':'Female');
  if(filters.fsm!=='any') parts.push('FSM:'+filters.fsm);
  if(filters.ehcp!=='any') parts.push('EHCP:'+filters.ehcp);
  if(filters.send!=='any') parts.push('SEND:'+filters.send);
  if(filters.subject!=='all') parts.push(filters.subject);
  if(filters.attband!=='any') parts.push('Att:'+filters.attband);
  return`${parts.join(' · ')} (n=${count})`;
}

  // ── ABSENCE PATTERNS ──

  // ── NETWORK GRAPH ──
  const tgNetDiv=document.getElementById('tg-network');
  if(typeof renderNet==='function'){
    // Find co-occurring sanctions within TG
    const tgLessonSanc=tgSancAY.filter(s=>s[3]!=null&&s[4]!=null);
    // Group by date+period
    const slotMap={};
    tgLessonSanc.forEach(s=>{
      const key=s[2]+'|'+s[4];
      if(!slotMap[key]) slotMap[key]=[];
      slotMap[key].push(s[0]);
    });
    // Find pairs
    const pairCounts={};
    Object.values(slotMap).forEach(pupils=>{
      if(pupils.length<2) return;
      const unique=[...new Set(pupils)];
      for(let i=0;i<unique.length;i++){
        for(let j=i+1;j<unique.length;j++){
          const k=[unique[i],unique[j]].sort().join('-');
          pairCounts[k]=(pairCounts[k]||0)+1;
        }
      }
    });

    const pairs=Object.entries(pairCounts).filter(([k,v])=>v>=2).sort((a,b)=>b[1]-a[1]);
    if(pairs.length){
      const nodes=new Set();
      pairs.forEach(([k])=>{k.split('-').forEach(px=>nodes.add(parseInt(px)))});
      const nodeData=[...nodes].map(px=>({px,name:(REG[String(px)]?.id||String(px)).replace(/\s*\(P?\d+\)\s*$/,'').replace(/\s*\(\d+ \w+\)\s*$/,''),tg:tgName}));
      const links=pairs.map(([k,v])=>{const[a,b]=k.split('-').map(Number);return{source:a,target:b,weight:v}});

      // Render SVG network
      const W=Math.min(1200,tgNetDiv.clientWidth||900),H=400;
      const R=14,pad=40;
      // Oval layout - wider than tall
      const cx=W/2,cy=H/2,radiusX=W/2-pad-R,radiusY=H/2-pad-R;
      nodeData.forEach((n,i)=>{
        const angle=(2*Math.PI*i/nodeData.length)-Math.PI/2;
        n.x=cx+radiusX*Math.cos(angle);
        n.y=cy+radiusY*Math.sin(angle);
        n.r=R;
      });
      const maxW=Math.max(...links.map(l=>l.weight));
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:450px">`;
      links.forEach(l=>{
        const s=nodeData.find(n=>n.px===l.source),t=nodeData.find(n=>n.px===l.target);
        if(!s||!t)return;
        const w=Math.max(1,l.weight/maxW*6);
        const op=Math.min(0.8,0.2+l.weight/maxW*0.6);
        svg+=`<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#ef4444" stroke-width="${w}" stroke-opacity="${op}"/>`;
        const mx=(s.x+t.x)/2,my=(s.y+t.y)/2;
        svg+=`<text x="${mx}" y="${my-4}" fill="var(--mu)" font-size="7" font-family="JetBrains Mono" text-anchor="middle">${l.weight}</text>`;
      });
      nodeData.forEach(n=>{
        svg+=`<circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="var(--sf)" stroke="var(--ac)" stroke-width="1.5"/>`;
        svg+=`<text x="${n.x}" y="${n.y+3}" fill="var(--tx)" font-size="10" font-family="Outfit" text-anchor="middle" style="pointer-events:none">${n.name.split(' ')[0]}</text>`;
        svg+=`<text x="${n.x}" y="${n.y+n.r+14}" fill="var(--mu)" font-size="7" font-family="Outfit" text-anchor="middle">${n.name.split(' ').slice(1).join(' ')}</text>`;
      });
      svg+=`</svg>`;
      tgNetDiv.innerHTML=`<div class="dw"><div class="dwt">Sanction Pair Network — ${tgName}</div><div style="font-size:.6rem;color:var(--mu);margin-bottom:.5rem">Showing pupils sanctioned together in the same lesson ≥2 times this academic year</div>${svg}</div>`;
    }else{

    sc2('tgab',new Chart(document.getElementById('c-tgab'),{type:'line',data:{labels:labs,datasets:abDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:showLegend},scales:{y:{min:abYMin,max:abYMax,ticks:{color:'#666666',font:{size:11},stepSize:1,callback:v=>{const n=['Bel','Dev','Wrk','Met','Con','Skl','Exc'];return Number.isInteger(v)&&v>=1&&v<=7?n[v-1]:''}},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},x:{ticks:{color:'#666666'},grid:{display:false},border:{color:'#d4d4d4'}}}}}));
    sc2('tgef',new Chart(document.getElementById('c-tgef'),{type:'line',data:{labels:labs,datasets:efDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:showLegend},scales:{y:{reverse:true,min:efYMin,max:efYMax,ticks:{color:'#666666',font:{size:11},stepSize:1},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},x:{ticks:{color:'#666666'},grid:{display:false},border:{color:'#d4d4d4'}}}}}));

  function rAnalytics(){

    const classEl=document.getElementById('an-class-scatter');

    if(!ink){subjEl.innerHTML='<div style="color:var(--mu)">No data for Y'+yearGroup+'</div>';classEl.innerHTML='';return}
    const ik=`I${ink}`;
    const enrols=ENR[ik]||[];
    const SAN=DD.sanctions||[];
    const today=new Date();
    const todayISO=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const ayStart=`${CAY}-09-01`;
    const WLK=DD.weekLessons||{};
    let totalWeeks=0;
    for(const w of Object.keys(WLK)){if(w>=ayStart&&w<=todayISO)totalWeeks++}

    // Sortable table helper
    function sortableTable(tbodyId,data,renderRow,defaultSortFn){
      let sortFn=defaultSortFn,sortDir='desc';
      function render(){
        const sorted=[...data].sort((a,b)=>{
          const va=sortFn(a),vb=sortFn(b);
          if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return-1;
          const cmp=typeof va==='string'?va.localeCompare(vb):va-vb;
          return sortDir==='asc'?cmp:-cmp;
        });
        const el=document.getElementById(tbodyId);
        if(el)el.innerHTML=sorted.map(renderRow).join('');
      }
      return{render,setSort:(fn)=>{if(sortFn===fn)sortDir=sortDir==='asc'?'desc':'asc';else{sortFn=fn;sortDir='desc'}render()}};
    }

    // ── BUILD SUBJECT DATA ──
    const subjData=[];
    SUBS.forEach(sub=>{
      const pupils=new Set(enrols.filter(r=>r.t==='cls'&&r.s===sub&&r.u===null).map(r=>r.x));
      if(pupils.size<3) return;
      let totalLessons=0,totalAbs=0;
      pupils.forEach(px=>{
        const tt=TT_DATA[String(px)];
        let lpw=0;
        if(tt){for(let d=0;d<5;d++)for(let p=0;p<5;p++){const gc=tt[d]?.[p];if(gc&&(gc[0]===sub||(gc.length===4&&gc[2]===sub)))lpw++}}
        totalLessons+=lpw*totalWeeks;
        const pAbs=(DD.attAbsSubj||{})[String(px)]||[];
        totalAbs+=pAbs.filter(r=>r[1]===sub&&r[0]>=ayStart&&r[0]<=todayISO).length;
      });
      const attPct=totalLessons>0?((totalLessons-totalAbs)/totalLessons*100):100;
      const subjSanc=SAN.filter(s=>pupils.has(s[0])&&s[3]===sub&&s[2]>=ayStart&&s[2]<=todayISO&&s[1]===0);
      const codesPerPupil=subjSanc.length/pupils.size;
      const sendCount=[...pupils].filter(px=>DD.senStatus?.[String(px)]).length;
      const sendPct=(sendCount/pupils.size*100).toFixed(0);
      const totalCodes=subjSanc.length;
      subjData.push({sub,pupils:pupils.size,attPct:parseFloat(attPct.toFixed(1)),codesPerPupil:parseFloat(codesPerPupil.toFixed(2)),sendPct:parseInt(sendPct),totalCodes});
    });

    // ── BUILD CLASS DATA ──
    const classData=[];
    SUBS.forEach(sub=>{
      const classMap2={};
      enrols.filter(r=>r.t==='cls'&&r.s===sub&&r.u===null).forEach(r=>{
        if(!classMap2[r.c]) classMap2[r.c]={pupils:new Set(),teacher:r.tc};
        classMap2[r.c].pupils.add(r.x);

      Object.entries(classMap2).forEach(([cls,info])=>{
        if(info.pupils.size<3) return;
        const pupils=info.pupils;
        let totalLessons=0,totalAbs=0;
        pupils.forEach(px=>{
          const tt=TT_DATA[String(px)];

          if(tt){for(let d=0;d<5;d++)for(let p=0;p<5;p++){const gc=tt[d]?.[p];if(gc&&(gc[0]===sub||(gc.length===4&&gc[2]===sub)))lpw++}}
          totalLessons+=lpw*totalWeeks;
          const pAbs=(DD.attAbsSubj||{})[String(px)]||[];
          totalAbs+=pAbs.filter(r=>r[1]===sub&&r[0]>=ayStart&&r[0]<=todayISO).length;
        });
        const attPct=totalLessons>0?((totalLessons-totalAbs)/totalLessons*100):100;
        const classSanc=SAN.filter(s=>pupils.has(s[0])&&s[3]===sub&&s[2]>=ayStart&&s[2]<=todayISO&&s[1]===0);
        const codesPerPupil=classSanc.length/pupils.size;
        const sendCount=[...pupils].filter(px=>DD.senStatus?.[String(px)]).length;
        const sendPct=(sendCount/pupils.size*100).toFixed(0);
        const totalCodes=classSanc.length;
        classData.push({sub,cls:parseInt(cls),teacher:info.teacher,pupils:pupils.size,attPct:parseFloat(attPct.toFixed(1)),codesPerPupil:parseFloat(codesPerPupil.toFixed(2)),sendPct:parseInt(sendPct),totalCodes});
      });
    });

    // ── COLOURS ──
    const colors=['#ef4444','#f97316','#eab308','#34d399','#38bdf8','#6488ff','#a78bfa','#f472b6','#94a3b8','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#6366f1','#d946ef','#0ea5e9','#84cc16','#fb923c','#e11d48','#2dd4bf','#7c3aed','#059669','#dc2626'];
    const subjColorMap={};
    SUBS.forEach((s,i)=>{subjColorMap[s]=colors[i%colors.length]});

    // ── SUBJECT SCATTER + TABLE ──
    try{
      if(!subjData.length){subjEl.innerHTML='<div style="color:var(--mu)">No subject data</div>'}
      else{
        const avgAtt=subjData.reduce((s,d)=>s+d.attPct,0)/subjData.length;
        const avgCodes=subjData.reduce((s,d)=>s+d.codesPerPupil,0)/subjData.length;
        dc('anSubjChart');
        const renderSR=d=>`<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${subjColorMap[d.sub]||'#94a3b8'};margin-right:.3rem"></span>${d.sub}</td><td style="text-align:center;font-family:'JetBrains Mono',monospace;${d.attPct<avgAtt?'color:#ef4444;font-weight:600':''}">${d.attPct}%</td><td style="text-align:center;font-family:'JetBrains Mono',monospace;${d.codesPerPupil>avgCodes?'color:#ef4444;font-weight:600':''}">${d.codesPerPupil.toFixed(1)}</td><td style="text-align:center">${d.pupils}</td><td style="text-align:center;color:#f97316">${d.sendPct}%</td><td style="text-align:center">${d.totalCodes}</td></tr>`;
        subjEl.innerHTML=`<div class="dw"><div class="dwt">Subject Risk Matrix — Y${yearGroup}</div><div style="position:relative;height:400px"><canvas id="c-anSubjChart"></canvas></div></div><div class="dw" style="margin-top:.5rem"><div class="dwt">Subject Data <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.68rem;color:var(--mu)">${subjData.length} subjects · Avg Att: ${avgAtt.toFixed(1)}% · Avg Codes/Pupil: ${avgCodes.toFixed(1)}</span></div><div style="overflow-x:auto"><table class="d"><thead><tr><th style="cursor:pointer" onclick="window._anSS.setSort('sub')">Subject ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anSS.setSort('attPct')">Att % ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anSS.setSort('codesPerPupil')">Codes/Pupil ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anSS.setSort('pupils')">Pupils ↕</th><th style="text-align:center;color:#f97316;cursor:pointer" onclick="window._anSS.setSort('sendPct')">SEND % ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anSS.setSort('totalCodes')">Total Codes ↕</th></tr></thead><tbody id="an-subj-tbody"></tbody></table></div></div>`;
        window._anSS=sortableTable('an-subj-tbody',subjData,renderSR,d=>d.codesPerPupil);
        window._anSS.render();
        sc2('anSubjChart',new Chart(document.getElementById('c-anSubjChart'),{type:'scatter',data:{datasets:subjData.map(d=>({label:d.sub,data:[{x:d.attPct,y:d.codesPerPupil}],backgroundColor:subjColorMap[d.sub],borderColor:subjColorMap[d.sub],pointRadius:6,pointHoverRadius:9}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const d=subjData.find(dd=>dd.sub===c.dataset.label);return d?d.sub+': Att '+d.attPct+'%, '+d.codesPerPupil.toFixed(1)+' c/p, '+d.pupils+'p, '+d.sendPct+'% SEND':''}}}},scales:{x:{title:{display:true,text:'Attendance %',color:'#666666'},min:Math.max(75,Math.floor(Math.min(...subjData.map(d=>d.attPct))-2)),max:100,ticks:{color:'#666666',callback:v=>v+'%'},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},y:{title:{display:true,text:'Codes per Pupil',color:'#666666'},min:0,suggestedMax:Math.ceil(Math.max(...subjData.map(d=>d.codesPerPupil))+1),ticks:{color:'#666666'},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}}}}}));
      }
    }catch(e){subjEl.innerHTML='<div style="color:red">Subject error: '+e.message+'</div>'}

    // ── CLASS SCATTER + TABLE ──
    try{
      if(!classData.length){classEl.innerHTML=''}
      else{
        const avgAttC=classData.reduce((s,d)=>s+d.attPct,0)/classData.length;
        const avgCodesC=classData.reduce((s,d)=>s+d.codesPerPupil,0)/classData.length;
        dc('anClassChart');
        const subjGroups={};
        classData.forEach(d=>{if(!subjGroups[d.sub])subjGroups[d.sub]=[];subjGroups[d.sub].push({x:d.attPct,y:d.codesPerPupil,cls:d.cls,teacher:d.teacher,pupils:d.pupils,sendPct:d.sendPct})});
        const scatterDS=Object.entries(subjGroups).map(([sub,pts])=>({label:sub,data:pts,backgroundColor:subjColorMap[sub]||'#94a3b8',pointRadius:6,pointHoverRadius:9}));
        const renderCR=d=>`<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${subjColorMap[d.sub]||'#94a3b8'};margin-right:.3rem"></span>${d.sub}</td><td style="text-align:center">${d.cls}</td><td style="font-size:.72rem;color:var(--mu)">${d.teacher}</td><td style="text-align:center;font-family:'JetBrains Mono',monospace;${d.attPct<avgAttC?'color:#ef4444;font-weight:600':''}">${d.attPct}%</td><td style="text-align:center;font-family:'JetBrains Mono',monospace;${d.codesPerPupil>avgCodesC?'color:#ef4444;font-weight:600':''}">${d.codesPerPupil.toFixed(1)}</td><td style="text-align:center">${d.pupils}</td><td style="text-align:center;color:#f97316">${d.sendPct}%</td><td style="text-align:center">${d.totalCodes}</td></tr>`;
        classEl.innerHTML=`<div class="dw"><div class="dwt" style="display:flex;align-items:center;gap:.6rem">Class Risk Matrix — Y${yearGroup}<span style="margin-left:auto;display:flex;gap:.3rem"><button onclick="const c=_c['anClassChart'];c.data.datasets.forEach(d=>{d.hidden=false});c.update()" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.6rem;padding:.2rem .4rem;border-radius:4px;cursor:pointer">Select All</button><button onclick="const c=_c['anClassChart'];c.data.datasets.forEach(d=>{d.hidden=true});c.update()" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.6rem;padding:.2rem .4rem;border-radius:4px;cursor:pointer">Deselect All</button></span></div><div style="position:relative;height:400px"><canvas id="c-anClassChart"></canvas></div></div><div class="dw" style="margin-top:.5rem"><div class="dwt">Class Data <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.68rem;color:var(--mu)">${classData.length} classes</span></div><div style="overflow-x:auto"><table class="d"><thead><tr><th style="cursor:pointer" onclick="window._anCS.setSort('sub')">Subject ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anCS.setSort('cls')">Class ↕</th><th style="cursor:pointer" onclick="window._anCS.setSort('teacher')">Teacher ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anCS.setSort('attPct')">Att % ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anCS.setSort('codesPerPupil')">Codes/Pupil ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anCS.setSort('pupils')">Pupils ↕</th><th style="text-align:center;color:#f97316;cursor:pointer" onclick="window._anCS.setSort('sendPct')">SEND % ↕</th><th style="text-align:center;cursor:pointer" onclick="window._anCS.setSort('totalCodes')">Total Codes ↕</th></tr></thead><tbody id="an-class-tbody"></tbody></table></div></div>`;
        window._anCS=sortableTable('an-class-tbody',classData,renderCR,d=>d.codesPerPupil);
        window._anCS.render();
        sc2('anClassChart',new Chart(document.getElementById('c-anClassChart'),{type:'scatter',data:{datasets:scatterDS},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#666666',font:{family:'Outfit',size:8},boxWidth:8,padding:4,usePointStyle:true}},tooltip:{callbacks:{label:c=>{const pt=c.raw;return c.dataset.label+' Cls'+pt.cls+' ('+pt.teacher+'): Att '+pt.x+'%, '+pt.y.toFixed(1)+' c/p, '+pt.pupils+'p, '+pt.sendPct+'% SEND'}}}},scales:{x:{title:{display:true,text:'Attendance %',color:'#666666'},min:Math.max(75,Math.floor(Math.min(...classData.map(d=>d.attPct))-2)),max:100,ticks:{color:'#666666',callback:v=>v+'%'},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},y:{title:{display:true,text:'Codes per Pupil',color:'#666666'},min:0,suggestedMax:Math.ceil(Math.max(...classData.map(d=>d.codesPerPupil))+1),ticks:{color:'#666666'},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}}}}}));
      }
    }catch(e){classEl.innerHTML='<div style="color:red">Class error: '+e.message+'</div>'}
  }

  window.popTG=popTG;
  window.rTG=rTG;
  // ── ADMIN TAB ──
  function rAdmin(){
    const out=document.getElementById('admin-out');
    const attCodes=DD.config.att_codes||{};
    const senCodes=DD.config.sen_codes||{};
    const incidentCodes=DD.config.incident_codes||{};

    // Collect all codes actually found in data
    const foundAttCodes=new Set();
    Object.values(DD.attendanceMarks||{}).forEach(byDate=>{
      Object.values(byDate).forEach(marks=>{marks.forEach(m=>foundAttCodes.add(m))});
    });
    const foundSenCodes=new Set(Object.values(DD.senStatus||{}));
    const foundIncidentCodes=new Set();
    (DD.sanctionDetails||[]).forEach(d=>{if(d&&d[0])foundIncidentCodes.add(d[0])});

    // Classify attendance codes
    const allAttCategories=['present','authorised_absent','unauthorised_absent','not_counted'];
    const attCatLabels={'present':'Present','authorised_absent':'Auth. Absent','unauthorised_absent':'Unauth. Absent','not_counted':'Not Counted'};
    const attCatColors={'present':'#34d399','authorised_absent':'#f97316','unauthorised_absent':'#ef4444','not_counted':'#94a3b8'};
    const classifiedAtt={};
    allAttCategories.forEach(cat=>{(attCodes[cat]||[]).forEach(c=>{classifiedAtt[c]=cat})});
    const unclassifiedAtt=[...foundAttCodes].filter(c=>!classifiedAtt[c]).sort();

    // Build attendance table
    let attHtml=`<div class="dw" style="margin-bottom:1.25rem"><div class="dwt">Attendance Codes</div>`;
    if(unclassifiedAtt.length){
      attHtml+=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.5rem .7rem;margin-bottom:.6rem;font-size:.72rem"><span style="color:#ef4444;font-weight:600">⚠ ${unclassifiedAtt.length} unclassified code${unclassifiedAtt.length!==1?'s':''}: </span>${unclassifiedAtt.map(c=>`<b>${c}</b>`).join(', ')}</div>`;
    }
    attHtml+=`<div style="overflow-x:auto"><table class="d"><thead><tr><th>Code</th><th>Category</th><th style="text-align:center">In Data</th><th>Change</th></tr></thead><tbody>`;
    // Show unclassified first
    unclassifiedAtt.forEach(c=>{
      attHtml+=`<tr style="background:rgba(239,68,68,.08)"><td style="font-weight:600">${c}</td><td style="color:#ef4444;font-weight:600">UNCLASSIFIED</td><td style="text-align:center">✓</td><td><select onchange="window._adminSetAtt('${c}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.68rem;padding:.2rem;border-radius:4px"><option value="">— Select —</option>${allAttCategories.map(cat=>`<option value="${cat}">${attCatLabels[cat]}</option>`).join('')}</select></td></tr>`;
    });
    // Then classified
    const allClassified=Object.entries(classifiedAtt).sort((a,b)=>a[1].localeCompare(b[1])||a[0].localeCompare(b[0]));
    allClassified.forEach(([c,cat])=>{
      const inData=foundAttCodes.has(c);
      attHtml+=`<tr><td style="font-weight:600">${c}</td><td style="color:${attCatColors[cat]};font-weight:500">${attCatLabels[cat]}</td><td style="text-align:center;color:${inData?'var(--tx)':'var(--mu)'}">${inData?'✓':'—'}</td><td><select onchange="window._adminSetAtt('${c}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.68rem;padding:.2rem;border-radius:4px">${allAttCategories.map(ct=>`<option value="${ct}"${ct===cat?' selected':''}>${attCatLabels[ct]}</option>`).join('')}</select></td></tr>`;
    });
    attHtml+=`</tbody></table></div></div>`;

    // Build SEN codes table
    let senHtml=`<div class="dw" style="margin-bottom:1.25rem"><div class="dwt">SEN Codes</div>`;
    const unclassifiedSen=[...foundSenCodes].filter(c=>!senCodes[c]).sort();
    if(unclassifiedSen.length){
      senHtml+=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.5rem .7rem;margin-bottom:.6rem;font-size:.72rem"><span style="color:#ef4444;font-weight:600">⚠ ${unclassifiedSen.length} unclassified SEN code${unclassifiedSen.length!==1?'s':''}: </span>${unclassifiedSen.map(c=>`<b>${c}</b>`).join(', ')}</div>`;
    }
    senHtml+=`<div style="overflow-x:auto"><table class="d"><thead><tr><th>Code</th><th>Label</th><th>Colour</th><th style="text-align:center">Pupils</th><th>Edit Label</th></tr></thead><tbody>`;
    const senEntries={...senCodes};
    unclassifiedSen.forEach(c=>{senEntries[c]='UNCLASSIFIED'});
    const senCounts={};
    Object.values(DD.senStatus||{}).forEach(c=>{senCounts[c]=(senCounts[c]||0)+1});
    Object.entries(senEntries).forEach(([code,label])=>{
      const col=SEN_COLORS[code]||'#94a3b8';
      const count=senCounts[code]||0;
      const isUnc=label==='UNCLASSIFIED';
      senHtml+=`<tr${isUnc?' style="background:rgba(239,68,68,.08)"':''}><td style="font-weight:600">${code}</td><td style="${isUnc?'color:#ef4444;font-weight:600':''}">${label}</td><td><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${col};vertical-align:middle"></span> ${col}</td><td style="text-align:center">${count||'—'}</td><td><input value="${isUnc?'':label}" placeholder="Enter label" onchange="window._adminSetSen('${code}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.68rem;padding:.2rem .4rem;border-radius:4px;width:120px"></td></tr>`;
    });
    senHtml+=`</tbody></table></div></div>`;

    // Build incident codes table
    let incHtml=`<div class="dw" style="margin-bottom:1.25rem"><div class="dwt">Incident Codes (Behaviour Categories)</div>`;
    const incCategories=['Behaviour','Uniform','Equipment','Attendance','Detention','Other'];
    const incCatColors={'Behaviour':'#ef4444','Uniform':'#f97316','Equipment':'#eab308','Attendance':'#38bdf8','Detention':'#7c3aed','Other':'#94a3b8'};
    const unclassifiedInc=[...foundIncidentCodes].filter(c=>!incidentCodes[c]).sort();
    if(unclassifiedInc.length){
      incHtml+=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:.5rem .7rem;margin-bottom:.6rem;font-size:.72rem"><span style="color:#ef4444;font-weight:600">⚠ ${unclassifiedInc.length} unclassified incident code${unclassifiedInc.length!==1?'s':''}: </span>${unclassifiedInc.map(c=>`<b>${c}</b>`).join(', ')}</div>`;
    }
    // Count occurrences per incident code
    const incCounts={};
    (DD.sanctionDetails||[]).forEach(d=>{if(d&&d[0])incCounts[d[0]]=(incCounts[d[0]]||0)+1});
    incHtml+=`<div style="overflow-x:auto"><table class="d"><thead><tr><th>Incident Code</th><th>Category</th><th style="text-align:center">Count</th><th>Change</th></tr></thead><tbody>`;
    // Unclassified first
    unclassifiedInc.forEach(c=>{
      incHtml+=`<tr style="background:rgba(239,68,68,.08)"><td style="font-weight:500;font-size:.72rem">${c}</td><td style="color:#ef4444;font-weight:600">UNCLASSIFIED</td><td style="text-align:center">${incCounts[c]||0}</td><td><select onchange="window._adminSetInc('${c.replace(/'/g,"\\'")}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.68rem;padding:.2rem;border-radius:4px"><option value="">— Select —</option>${incCategories.map(cat=>`<option value="${cat}">${cat}</option>`).join('')}</select></td></tr>`;
    });
    // Classified, grouped by category
    incCategories.forEach(cat=>{
      const codes=Object.entries(incidentCodes).filter(([c,ct])=>ct===cat).sort((a,b)=>a[0].localeCompare(b[0]));
      codes.forEach(([c,ct])=>{
        incHtml+=`<tr><td style="font-weight:500;font-size:.72rem">${c}</td><td style="color:${incCatColors[cat]||'var(--mu)'};font-weight:500">${cat}</td><td style="text-align:center">${incCounts[c]||'—'}</td><td><select onchange="window._adminSetInc('${c.replace(/'/g,"\\'")}',this.value)" style="background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:.68rem;padding:.2rem;border-radius:4px">${incCategories.map(ct2=>`<option value="${ct2}"${ct2===cat?' selected':''}>${ct2}</option>`).join('')}</select></td></tr>`;
      });
    });
    incHtml+=`</tbody></table></div></div>`;

    // Summary
    const summaryHtml=`<div class="dw" style="margin-bottom:1.25rem"><div class="dwt">Data Key Summary</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.8rem;padding:.5rem 0">
        <div style="font-size:.75rem"><span style="color:#34d399;font-weight:600">${(attCodes.present||[]).length}</span> Present codes · <span style="color:#f97316;font-weight:600">${(attCodes.authorised_absent||[]).length}</span> Auth Absent · <span style="color:#ef4444;font-weight:600">${(attCodes.unauthorised_absent||[]).length}</span> Unauth · <span style="color:#94a3b8;font-weight:600">${(attCodes.not_counted||[]).length}</span> Not Counted${unclassifiedAtt.length?` · <span style="color:#ef4444;font-weight:700">${unclassifiedAtt.length} UNCLASSIFIED</span>`:''}</div>
        <div style="font-size:.75rem"><span style="color:#f97316;font-weight:600">${Object.keys(senCodes).length}</span> SEN codes${unclassifiedSen.length?` · <span style="color:#ef4444;font-weight:700">${unclassifiedSen.length} UNCLASSIFIED</span>`:''}</div>
        <div style="font-size:.75rem"><span style="color:#7c3aed;font-weight:600">${Object.keys(incidentCodes).length}</span> Incident codes${unclassifiedInc.length?` · <span style="color:#ef4444;font-weight:700">${unclassifiedInc.length} UNCLASSIFIED</span>`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.8rem;margin-top:.5rem"><button onclick="window._adminExport()" style="background:var(--ac);color:#fff;border:none;font-family:inherit;font-size:.72rem;font-weight:600;padding:.4rem .8rem;border-radius:6px;cursor:pointer">Save</button><span style="font-size:.65rem;color:var(--mu)">Changes take effect immediately. Save downloads the current config for use in future imports.</span></div>
    </div>`;

    out.innerHTML=summaryHtml+attHtml+senHtml+incHtml;
  }

  // Admin change handlers
  window._adminSetAtt=function(code,cat){
    const ac=DD.config.att_codes;
    // Remove from all categories
    ['present','authorised_absent','unauthorised_absent','not_counted'].forEach(c=>{
      ac[c]=(ac[c]||[]).filter(x=>x!==code);
    });
    // Add to new category
    if(cat&&ac[cat]) ac[cat].push(code);
    ac[cat]=(ac[cat]||[]).sort();
    // Update runtime sets
    UNAUTH_MARKS.clear();(ac.unauthorised_absent||[]).forEach(c=>UNAUTH_MARKS.add(c));
    NOT_COUNTED_MARKS.clear();(ac.not_counted||[]).forEach(c=>NOT_COUNTED_MARKS.add(c));
    rAdmin();
  };
  window._adminSetSen=function(code,label){
    if(label){
      DD.config.sen_codes[code]=label;
      SEN_LABELS[code]=label;
    }
    rAdmin();
  };
  window._adminSetInc=function(code,cat){
    DD.config.incident_codes[code]=cat;
    // Update sanctionDetails in place
    const SAN2=DD.sanctions||[];
    (DD.sanctionDetails||[]).forEach((d,i)=>{
      if(d&&d[0]===code) d[1]=cat;
    });
    rAdmin();
  };

  window._adminExport=function(){
    const cfg={
      att_codes:DD.config.att_codes,
      sen_codes:DD.config.sen_codes,
      incident_codes:DD.config.incident_codes
    };
    const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='data_key_config.json';
    a.click();
  };

  window.rAnalytics=rAnalytics;
  window.rAdmin=rAdmin;
  window.rTV=rTV;
  window.rBC=rBC;
  window.rPP=rPP;
  window.rSEND=rSEND;
  window.renderNet=renderNet;
  window.renderPupilNet=renderPupilNet;
  window.renderAttTable=renderAttTable;
  window.renderDistCharts=renderDistCharts;
  window.peerAddRow=peerAddRow;
  window.peerDelRow=peerDelRow;
  window.rPeer=rPeer;
  window.popBCTG=popBCTG;
  window.goP=goP;
  window.applyCT=applyCT;
  window.showCTModal=showCTModal;
  window.hideCTModal=hideCTModal;
  window.applySW=applySW;
  window.showSWModal=showSWModal;
  window.hideSWModal=hideSWModal;
  window.toggleAll=toggleAll;

})(); // end async boot
</script></body></html>
