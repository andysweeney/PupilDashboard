    const fD=[];if(fd.send.some(v=>v))fD.push({label:'SEND',data:fd.send,color:'#f97316'});if(fd.ehcp.some(v=>v))fD.push({label:'EHCP',data:fd.ehcp,color:'#a78bfa'});if(fd.fsm.some(v=>v))fD.push({label:'FSM',data:fd.fsm,color:'#6488ff'});
    const fw=document.getElementById(flgWId);
    if(fD.length){fw.style.height=(fD.length*18+6)+'px';fw.style.display='';
    sc2(flgKey,new Chart(document.getElementById(cFlgId),{type:'bar',data:{labels:wl,datasets:fD.map((f,i)=>({label:f.label,data:f.data.map(v=>v?i+1:null),backgroundColor:f.data.map(v=>v?f.color+'cc':'transparent'),borderRadius:1,borderSkipped:false,barPercentage:0.9,categoryPercentage:0.9,base:i}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{filter:c=>c.parsed.y!==null,callbacks:{title:c=>c?.length?`Wk ${new Date(wks[c[0].dataIndex]+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`:'',label:c=>` ${c.dataset.label}`}}},scales:{x:{display:false,stacked:true,offset:true},y:{position:'left',min:0,max:fD.length,ticks:{color:'#666666',font:{size:7},stepSize:1,callback:v=>Number.isInteger(v)&&v>=0&&v<fD.length?fD[v].label:''},afterBuildTicks:a=>{a.ticks=fD.map((_,i)=>({value:i}))},grid:{display:false},border:{color:'#d4d4d4'},afterFit:a=>{a.width=35}},y1:{position:'right',display:true,ticks:{display:false},grid:{display:false},border:{display:false},afterFit:a=>{a.width=35}}}}}))
    }else fw.style.display='none';
  }else{
    document.getElementById(flgWId).style.display='none';
  }
  // Teacher timeline bars
  const pu2=REG[x],ink2=pu2.intake,en2=getEn(ink2,x);
  // For subject chart: show that subject's teacher history
  // For overall chart: show the selected subject's teacher from dropdown
  const teacherSubj=subjFilter||(()=>{const sf3=document.getElementById('p-sf');return sf3&&sf3.value!=='all'?sf3.value:null})();
  const tchrW=document.getElementById(tchrWId);

  if(teacherSubj){
    // Get class enrolment records for this subject, sorted by date
    const clsRecs=en2.filter(r=>r.t==='cls'&&r.s===teacherSubj).sort((a,b)=>a.f.localeCompare(b.f));
    if(clsRecs.length){
      // Assign a colour to each unique teacher
      const tchrColors=['#38bdf8','#fb923c','#a78bfa','#f472b6','#34d399','#eab308','#ef4444'];
      const uniqueTeachers=[...new Set(clsRecs.map(r=>r.tc))];
      const tchrColMap={};uniqueTeachers.forEach((t,i)=>{tchrColMap[t]=tchrColors[i%tchrColors.length]});

      // Map each week to the active teacher
      const tchrData=wks.map(w=>{
        for(let i=clsRecs.length-1;i>=0;i--){
          const r=clsRecs[i];
          if(w+'T12:00:00'>=r.f&&(r.u===null||w<r.u)) return{tc:r.tc,idx:uniqueTeachers.indexOf(r.tc)};
        }
        return null;
      });

      const nTeachers=1;// Single row for the subject teacher
      tchrW.style.height='24px';tchrW.style.display='';
      sc2(tchrKey,new Chart(document.getElementById(cTchrId),{type:'bar',data:{labels:wl,datasets:[{
        label:teacherSubj+' Teacher',
        data:tchrData.map(d=>d?1:null),
        backgroundColor:tchrData.map(d=>d?tchrColMap[d.tc]+'cc':'transparent'),
        borderRadius:1,borderSkipped:false,barPercentage:0.9,categoryPercentage:0.9,base:0
      }]},options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{filter:c=>c.parsed.y!==null,callbacks:{
          title:c=>c?.length?`Wk ${new Date(wks[c[0].dataIndex]+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`:'',
          label:c=>{const d=tchrData[c.dataIndex];return d?` ${d.tc}`:''}
        }}},
        scales:{x:{display:false,stacked:true,offset:true},
          y:{position:'left',min:0,max:1,ticks:{color:'#666666',font:{size:7},stepSize:1,
            callback:v=>v===0?teacherSubj:''},afterBuildTicks:a=>{a.ticks=[{value:0}]},
            grid:{display:false},border:{color:'#d4d4d4'},afterFit:a=>{a.width=35}},
          y1:{position:'right',display:true,ticks:{display:false},grid:{display:false},border:{display:false},afterFit:a=>{a.width=35}}
        }
      }}));

      // Add a small legend showing teacher colours
      const tchrLegend=document.createElement('div');
      tchrLegend.style.cssText='display:flex;gap:.5rem;flex-wrap:wrap;padding:.2rem 0 0 36px;font-size:.6rem';
      uniqueTeachers.forEach(t=>{
        tchrLegend.innerHTML+=`<span style="color:${tchrColMap[t]}">● ${t}</span>`;
      });
      tchrW.appendChild(tchrLegend);
    }else{tchrW.style.display='none'}
  }else{tchrW.style.display='none'}

  // Return week range for alignment
  return wks.length?[wks[0],wks[wks.length-1]]:null;
}

// ── SANCTIONS HEATMAPS ──
function rHeatmaps(x,ink,subjFilter){
  const SAN=DD.sanctions||[];
  const _hmToday=new Date();
  const _hmTodayISO=`${_hmToday.getFullYear()}-${String(_hmToday.getMonth()+1).padStart(2,'0')}-${String(_hmToday.getDate()).padStart(2,'0')}`;
  const ps=SAN.filter(r=>r[0]===x&&r[2]<=_hmTodayISO);
  // Build index map to get categories
  const psWithCat=[];
  SAN.forEach((r,i)=>{if(r[0]===x&&r[2]<=_hmTodayISO)psWithCat.push({r,cat:SANC_DET[i]?SANC_DET[i][1]:'Other',incident:SANC_DET[i]?SANC_DET[i][0]:''})});
  const wrap=document.getElementById('p-heatmaps');
  if(!ps.length){wrap.innerHTML='';return}

  const selSubj=subjFilter&&subjFilter!=='all'?subjFilter:null;

  // Group sanctions by academic year
  const sa=ink,la=Math.min(ink+4,CAY);
  const ayList=[];for(let ay=sa;ay<=la;ay++) ayList.push(ay);

  // ── 1. CALENDAR HEATMAP ──
  // Build day->count map and day->type breakdown
  const dayCounts={};
  const dayTypes={};// {date: [codeCount, onCallCount, detentionCount]}
  const daySubjCounts={};// {date: count for selected subject}
  const dayDetails={};// {date: [{type, subj, cat},...]}
  const TN2=['Code','On-Call','Detention'];
  const CAT_SHORT={'Behaviour':'B','Uniform':'U','Equipment':'E','Attendance':'A','Detention':'D','Other':'?'};
  psWithCat.forEach(s=>{
    const r=s.r;
    dayCounts[r[2]]=(dayCounts[r[2]]||0)+1;
    if(!dayTypes[r[2]])dayTypes[r[2]]=[0,0,0];
    dayTypes[r[2]][r[1]]++;
    if(selSubj&&r[3]===selSubj) daySubjCounts[r[2]]=(daySubjCounts[r[2]]||0)+1;
    if(!dayDetails[r[2]])dayDetails[r[2]]=[];
    dayDetails[r[2]].push({type:r[1],subj:r[3]||'Non-Lesson',cat:s.cat});
  });
  const maxCount=Math.max(...Object.values(dayCounts),1);

  function heatCol(n){
    if(!n) return 'var(--sf2)';
    const intensity=Math.min(n/Math.max(maxCount,5),1);
    if(intensity<0.25) return 'rgba(249,115,22,0.25)';
    if(intensity<0.5) return 'rgba(249,115,22,0.5)';
    if(intensity<0.75) return 'rgba(239,68,68,0.65)';
    return 'rgba(239,68,68,0.9)';
  }

  // Build calendar SVG per academic year
  const calHtml=ayList.map(ay=>{
    const label=`${ay}-${ay+1}`;
    // Generate all dates from Sep 1 to Jul 31
    const startD=new Date(ay,8,1);// Sep
    const endD=new Date(ay+1,6,31);// Jul

    // Find the Monday of the first week
    const firstMon=new Date(startD);
    firstMon.setDate(firstMon.getDate()-((firstMon.getDay()+6)%7));

    const weeks=[];
    let cur=new Date(firstMon);
    while(cur<=endD){
      const wk=[];
      for(let d=0;d<7;d++){
        const dd=new Date(cur);
        dd.setDate(dd.getDate()+d);
        const iso=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
        const inRange=dd>=startD&&dd<=endD;
        const isWeekend=dd.getDay()===0||dd.getDay()===6;
        wk.push({date:iso,count:dayCounts[iso]||0,inRange,isWeekend,month:dd.getMonth(),day:dd.getDate()});
      }
      weeks.push(wk);
      cur.setDate(cur.getDate()+7);
    }

    const cellSize=11,cellGap=2,totalCell=cellSize+cellGap;
    const svgW=weeks.length*totalCell+40;
    const svgH=7*totalCell+20;

    // Month labels
    const monthLabels=[];
    const months=['Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul'];
    let lastMonth=-1;
    weeks.forEach((wk,wi)=>{
      const midDay=wk[3];// Wednesday
      if(midDay.inRange&&midDay.month!==lastMonth){
        lastMonth=midDay.month;
        const mIdx=midDay.month>=8?midDay.month-8:midDay.month+4;
        monthLabels.push(`<text x="${wi*totalCell+40}" y="10" fill="var(--mu)" font-size="8" font-family="Outfit">${months[mIdx]||''}</text>`);
      }
    });

    // Day labels
    const dayLabels=['','M','','W','','F',''];
    const dayLabelsSvg=dayLabels.map((l,i)=>l?`<text x="30" y="${i*totalCell+24}" fill="var(--mu)" font-size="7" font-family="Outfit" text-anchor="end">${l}</text>`:'').join('');

    // Cells
    const cells=weeks.map((wk,wi)=>wk.map((d,di)=>{
      if(!d.inRange||d.isWeekend) return '';
      const sc2=daySubjCounts[d.date]||0;
      const cx=wi*totalCell+36+cellSize/2,cy=di*totalCell+15+cellSize/2;
      const dot=selSubj&&sc2?`<circle cx="${cx}" cy="${cy}" r="2.5" fill="#fff" opacity="0.9"/>`:'';
      return`<rect x="${wi*totalCell+36}" y="${di*totalCell+15}" width="${cellSize}" height="${cellSize}" rx="2" fill="${heatCol(d.count)}" data-hm-date="${d.date}" style="cursor:${d.count?'pointer':'default'}"/>${dot}`;
    }).join('')).join('');

    return`<div style="margin-bottom:.6rem"><div style="font-size:.7rem;color:var(--mu);margin-bottom:.3rem;font-weight:500">${label}</div><svg width="${svgW}" height="${svgH}" style="display:block">${monthLabels.join('')}${dayLabelsSvg}${cells}</svg></div>`;
  }).join('');

  // ── 2. DISTRIBUTION CHARTS (rendered separately in p-dist) ──
  const dowNames=['Mon','Tue','Wed','Thu','Fri'];

  // Academic year parsing (shared by all breakdowns)
  const aySet=new Set();
  const ayColors=['#6488ff','#f472b6','#34d399','#f97316','#a78bfa','#eab308','#ef4444'];
  function getAY(dateStr){const d2=new Date(dateStr+'T12:00:00');const m=d2.getMonth(),y=d2.getFullYear();const ayS=m>=8?y:y-1;const lbl=`${ayS}-${(ayS+1)%100}`;aySet.add(lbl);return lbl}

  // Pre-parse all sanctions with ay and type name
  const TNames=['Code','On-Call','Detention'];
  const _sanAll4=DD.sanctions||[];
  const psAY=ps.map(r=>{const si=_sanAll4.indexOf(r);const cat=SANC_DET[si]?SANC_DET[si][1]:'Other';return{t:r[1],d:r[2],s:r[3]||'Non-Lesson',p:r[4],ay:getAY(r[2]),cat}});
  const ayLabels=[...aySet].sort();

  // Type breakdown helper for detailed HTML tooltip
  function typeTipHtml(items){
    const c=[0,0,0];const subjMap={};const cats={b:0,u:0,e:0,a:0};
    items.forEach(r=>{c[r.t]++;if(!subjMap[r.s])subjMap[r.s]=[0,0,0];subjMap[r.s][r.t]++;
      if(r.t===0){if(r.cat==='Behaviour')cats.b++;else if(r.cat==='Uniform')cats.u++;else if(r.cat==='Equipment')cats.e++;else if(r.cat==='Attendance')cats.a++;else cats.b++}
    });
    const catParts=[];if(cats.b)catParts.push(`${cats.b}B`);if(cats.u)catParts.push(`${cats.u}U`);if(cats.e)catParts.push(`${cats.e}E`);if(cats.a)catParts.push(`${cats.a}A`);
    let h=`<div style="margin-bottom:.3rem">${TNames.map((n,i)=>c[i]?`<span style="color:${['#f97316','#ef4444','#7c3aed'][i]};font-weight:600">${c[i]} ${n}${c[i]!==1?'s':''}</span>`:null).filter(Boolean).join(' · ')}</div>`;
    if(catParts.length)h+=`<div style="font-size:.65rem;color:var(--mu);margin-bottom:.3rem">${catParts.join(' · ')}</div>`;
    const subs=Object.entries(subjMap).sort((a,b)=>(b[1][0]+b[1][1]+b[1][2])-(a[1][0]+a[1][1]+a[1][2]));
    if(subs.length){
      subs.forEach(([s,counts])=>{
        const detail=TNames.map((n,i)=>counts[i]?`<span style="color:${['#f97316','#ef4444','#7c3aed'][i]}">${counts[i]}${n[0]}</span>`:null).filter(Boolean).join(' ');
        h+=`<div style="display:flex;justify-content:space-between;gap:.8rem;padding:.1rem 0;border-bottom:1px solid rgba(38,45,68,.2);font-size:.68rem"><span style="color:var(--tx)">${s}</span><span>${detail}</span></div>`;
      });
    }
    return h;
  }
  window._typeTipHtml=typeTipHtml;


  // Legend
  const legend=`<div style="display:flex;gap:.3rem;align-items:center;margin-top:.5rem"><span style="font-size:.65rem;color:var(--mu)">Less</span>${[0,0.25,0.5,0.75,1].map(i=>`<div style="width:10px;height:10px;border-radius:2px;background:${i===0?'var(--sf2)':heatCol(i*maxCount)}"></div>`).join('')}<span style="font-size:.65rem;color:var(--mu)">More</span>${selSubj?`<span style="margin-left:.8rem;font-size:.65rem;color:var(--mu)"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;vertical-align:middle;margin-right:.2rem"></span>= ${selSubj} sanction</span>`:''}</div>`;

  // Rolling average sanctions (weighted: Detention=5, On-Call=3, Code=1)
  // Uses school days (from weekLessons) instead of calendar days
  const today2=new Date();
  const todayISO=`${today2.getFullYear()}-${String(today2.getMonth()+1).padStart(2,'0')}-${String(today2.getDate()).padStart(2,'0')}`;

  // Build sorted list of school days (Mon of each school week + 4 weekdays)
  const schoolDays=[];
  Object.keys(DD.weekLessons||{}).sort().forEach(wk=>{
    for(let off=0;off<5;off++){
      const d=new Date(wk+'T12:00:00');d.setDate(d.getDate()+off);
      const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(iso<=todayISO) schoolDays.push(iso);
    }
  });
  schoolDays.sort();

  function rollingAvgSD(nSchoolDays){
    // Find the cutoff: go back nSchoolDays from today in the school calendar
    const cutIdx=Math.max(0,schoolDays.length-nSchoolDays);
    const cutISO=schoolDays[cutIdx]||todayISO;
    const filtered=ps.filter(r=>r[2]>=cutISO&&r[2]<=todayISO&&(!selSubj||r[3]===selSubj));
    const weighted=filtered.reduce((sum,r)=>{
      const w=sancWeight(r[1]);
      return sum+w;
    },0);
    const count=filtered.length;
    // Average per 10 school days
    const avg=(weighted/(nSchoolDays/10)).toFixed(2);
    return{score:avg,total:count,weighted,schoolDays:nSchoolDays};
  }
  const ra200=rollingAvgSD(200),ra100=rollingAvgSD(100),ra20=rollingAvgSD(20),ra10=rollingAvgSD(10);

  function raRow(label,ra){
    const scoreNum=parseFloat(ra.score);
    const col=scoreNum>=1?'#ef4444':scoreNum>=0.5?'#f97316':scoreNum>=0.2?'#eab308':'#34d399';
    return`<tr>
      <td style="font-size:.75rem;font-weight:500">${label}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600;color:${col}">${ra.score}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${ra.total}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--mu)">${ra.weighted}</td>
    </tr>`;
  }

  const raTitle=selSubj?`Rolling Sanctions (${selSubj})`:'Rolling Sanctions (All Subjects)';
  const raTable=`<div class="dw"><div class="dwt">${raTitle}</div>
    <table class="d"><thead><tr>
      <th>Period</th><th style="text-align:center">10 Day Avg</th><th style="text-align:center">Count</th><th style="text-align:center">Weighted</th>
    </tr></thead><tbody>
      ${raRow('Last 10 school days',ra10)}
      ${raRow('Last 20 school days',ra20)}
      ${raRow('Last 100 school days',ra100)}
      ${raRow('Last 200 school days',ra200)}
    </tbody></table>
    <div style="font-size:.6rem;color:var(--mu);margin-top:.4rem">Weighting: Detention = ${SW_DET} · On-Call = ${SW_ONCALL} · Code = ${SW_CODE}. 10 Day Avg = Weighted ÷ (School Days ÷ 10). Holidays excluded.</div>
  </div>`;

  // ── AY COMPARISON CARD ──
  // How many school days into the current AY?
  const curAyStart=`${CAY}-09-01`;
  const curAySchoolDays=schoolDays.filter(d=>d>=curAyStart&&d<=todayISO);
  const dayIntoAY=curAySchoolDays.length;

  // For each AY, count sanctions (full year + up to same school day point)
  const ayCompRows=[];
  for(let ay=ink;ay<=CAY;ay++){
    const ayStart=`${ay}-09-01`;
    const ayEnd=`${ay+1}-07-31`;
    const ayEndCap=ayEnd<todayISO?ayEnd:todayISO;
    const yg=ay-ink+7;

    // All school days in this AY
    const aySD=schoolDays.filter(d=>d>=ayStart&&d<=ayEnd);
    // School days up to the equivalent day point
    const aySameDaySD=aySD.slice(0,dayIntoAY);
    const sameDayCutoff=aySameDaySD.length?aySameDaySD[aySameDaySD.length-1]:ayStart;

    // Full AY sanctions (up to today for current year, full year for past)
    const ayFullSanc=ps.filter(r=>r[2]>=ayStart&&r[2]<=ayEndCap&&(!selSubj||r[3]===selSubj||(selSubj===null&&true)));
    const fCodes=ayFullSanc.filter(r=>r[1]===0).length;
    const fOnCalls=ayFullSanc.filter(r=>r[1]===1).length;
    const fDets=ayFullSanc.filter(r=>r[1]===2).length;
    const fTotal=ayFullSanc.length;

    // Sanctions up to same school day point (for comparison)
    const aySameSanc=ps.filter(r=>r[2]>=ayStart&&r[2]<=sameDayCutoff&&(!selSubj||r[3]===selSubj||(selSubj===null&&true)));
    const sCodes=aySameSanc.filter(r=>r[1]===0).length;
    const sOnCalls=aySameSanc.filter(r=>r[1]===1).length;
    const sDets=aySameSanc.filter(r=>r[1]===2).length;
    const sTotal=aySameSanc.length;

    const isCurrent=ay===CAY;
    ayCompRows.push({ay,yg,isCurrent,fCodes,fOnCalls,fDets,fTotal,sCodes,sOnCalls,sDets,sTotal,dayIntoAY,sameDays:Math.min(dayIntoAY,aySD.length)});
  }

  function ayCell(full,same,isCurrent){
    if(isCurrent) return`<td style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600">${full}</td>`;
    return`<td style="text-align:center;font-family:'JetBrains Mono',monospace">${full} <span style="color:var(--mu);font-weight:400;font-size:.65rem">(${same})</span></td>`;
  }

  const ayCompHtml=ayCompRows.map(r=>{
    const label=`Y${r.yg} <span style="color:var(--mu);font-weight:400">${r.ay}-${r.ay+1}</span>`;
    return`<tr><td style="font-size:.75rem;font-weight:500">${label}</td>${ayCell(r.fCodes,r.sCodes,r.isCurrent)}${ayCell(r.fOnCalls,r.sOnCalls,r.isCurrent)}${ayCell(r.fDets,r.sDets,r.isCurrent)}${ayCell(r.fTotal,r.sTotal,r.isCurrent)}</tr>`;
  }).join('');

  const ayCompTitle=selSubj?`Year-on-Year Sanctions (${selSubj})`:'Year-on-Year Sanctions';
  const ayCompTable=`<div class="dw" style="margin-top:.85rem"><div class="dwt">${ayCompTitle}</div>
    <table class="d"><thead><tr>
      <th>Year</th><th style="text-align:center;color:#f97316">Codes</th><th style="text-align:center;color:#ef4444">On-Calls</th><th style="text-align:center;color:#7c3aed">Detentions</th><th style="text-align:center">Total</th>
    </tr></thead><tbody>${ayCompHtml}</tbody></table>
    <div style="font-size:.6rem;color:var(--mu);margin-top:.4rem">Current AY: Day ${dayIntoAY}. Bracketed numbers = sanctions up to school day ${dayIntoAY} in previous years for like-for-like comparison.</div>
  </div>`;

  wrap.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr auto;gap:.85rem;align-items:start">
      <div class="dw"><div class="dwt">Sanctions Calendar Heatmap</div>${calHtml}${legend}</div>
      <div>${raTable}${ayCompTable}</div>
    </div>`;

  // Attach heatmap custom tooltip
  setTimeout(()=>{
    const hmWrap=wrap.querySelector('.dw');
    if(!hmWrap) return;
    hmWrap.style.position='relative';
    const hmTip=document.createElement('div');
    hmTip.id='hm-tip';
    hmTip.style.cssText='display:none;position:absolute;pointer-events:none;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:.7rem;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:350px;z-index:999;font-size:.72rem';
    hmWrap.appendChild(hmTip);

    hmWrap.addEventListener('mousemove',ev=>{
      const rect2=ev.target.closest('rect[data-hm-date]');
      if(!rect2){hmTip.style.display='none';return}
      const dt=rect2.getAttribute('data-hm-date');
      const details=dayDetails[dt];
      const fmtD=new Date(dt+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      let h=`<div style="font-weight:600;margin-bottom:.3rem;color:var(--tx)">${fmtD}</div>`;
      if(!details||!details.length){
        h+=`<div style="color:var(--mu)">No sanctions</div>`;
      }else{
        h+=`<div style="color:var(--mu);margin-bottom:.3rem">${details.length} sanction${details.length!==1?'s':''}</div>`;
        details.forEach(d=>{
          const col=d.type===2?'#7c3aed':d.type===1?'#ef4444':'#f97316';
          const catLabel=d.type===2?'':'<span style="color:var(--mu);font-size:.65rem;margin-left:.3rem">['+( CAT_SHORT[d.cat]||'?')+']</span>';
          h+=`<div style="display:flex;gap:.5rem;padding:.1rem 0;border-bottom:1px solid rgba(38,45,68,.2)"><span style="color:${col};font-weight:600;min-width:4rem">${TN2[d.type]}${catLabel}</span><span style="color:var(--tx)">${d.subj||'Non-Lesson'}</span></div>`;
        });
      }
      hmTip.innerHTML=h;hmTip.style.display='block';
      const wr=hmWrap.getBoundingClientRect();

        avg=pA.length?pA.reduce((a,b)=>a+b,0)/pA.length:null;

        avgE=pE.length?pE.reduce((a,b)=>a+b,0)/pE.length:null;

        gb=AN.map(g=>({g,n:ag[g]||0})).filter(x=>x.n>0);
      }else{

      }

      const senCats2={K:0,E:0,Add:0,Strat:0,N:0};

          else{const e=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e2=>e2!=null&&e2>0);return e.length?e.reduce((a,b)=>a+b,0)/e.length:null}

      <td style="text-align:center;${c.nDetentions?'color:#7c3aed;font-weight:600':'color:var(--mu)'}">${c.nDetentions||'\u2014'}</td>
    </tr>`}).join('');

  out.innerHTML=`<div class="dw"><div class="dwt">Year ${targetYG} ${subLabel} \u2014 Cohort Comparison Over Time</div>
    <table class="d ctr"><thead><tr><th>Academic Year</th><th>Intake</th><th>Pupils</th><th>Avg Ab. <span style="font-weight:400;font-size:.55rem;color:var(--mu);margin-left:.3rem">(7 = Excellent)</span></th><th>Avg Ef. <span style="font-weight:400;font-size:.55rem;color:var(--mu);margin-left:.3rem">(1 = Highest Effort)</span></th><th>Grade Distribution \u2014 Final Term</th><th style="color:#f97316">SEND</th><th style="color:#f97316;font-size:.55rem">K</th><th style="color:#a78bfa;font-size:.55rem">E</th><th style="color:#38bdf8;font-size:.55rem">Add</th><th style="color:#34d399;font-size:.55rem">Strat</th><th style="color:#94a3b8;font-size:.55rem">N</th><th style="color:#6488ff">FSM</th><th style="color:#f97316">${isAll?'':'In-lesson '}Codes</th><th style="color:#ef4444">${isAll?'':'In-lesson '}On-Calls</th><th style="color:#7c3aed">${isAll?'':'In-lesson '}Detentions</th></tr></thead>
    <tbody>${tblRows}</tbody></table></div>
    <div class="ch-g"><div class="chc"><div class="cht">${subLabel} Ability by Stage \u2014 Cohort Comparison</div><div class="chw"><canvas id="c-cmpab"></canvas></div></div><div class="chc"><div class="cht">${subLabel} Effort by Stage \u2014 Cohort Comparison</div><div class="chw"><canvas id="c-cmpef"></canvas></div></div></div>`;

      }

        if(isAll){const pE=rs.map(r=>{const e=SUBS.map(s2=>r[3][s2]?r[3][s2][1]:null).filter(e2=>e2!=null&&e2>0);return e.length?e.reduce((a,b)=>a+b,0)/e.length:null}).filter(v=>v!=null);return pE.length?parseFloat((pE.reduce((a,b)=>a+b,0)/pE.length).toFixed(2)):null}

    });

  const abMin=Math.max(0.5,Math.floor((abMinV-0.1)*10)/10);

  sc2('cmpab',new Chart(document.getElementById('c-cmpab'),{type:'line',data:{labels:stageLabels,datasets:abDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#666666',font:{family:'Outfit',size:10},boxWidth:10,padding:10}},tooltip:flagTip(abDatasets)},scales:{y:{min:abMin,max:abMax,ticks:{color:'#666666',font:{size:11},stepSize:1,callback:v=>{const names=['Bel','Dev','Wrk','Met','Con','Skl','Exc'];return Number.isInteger(v)&&v>=1&&v<=7?names[v-1]:''}},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},x:{ticks:{color:'#666666',font:{size:8},maxRotation:45},grid:{color:'#d4d4d422'},border:{color:'#d4d4d4'}}}}}));

    const rows=periods[lastP];
    if(!rows||!rows.length) continue;

    let avg,avgE,gb;
    if(isAll){

      avgE=pE.length?pE.reduce((a,b)=>a+b,0)/pE.length:null;

      gb=AN.map(g=>({g,n:ag[g]||0})).filter(x=>x.n>0);
    }else{
      const sc=rows.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);

      const ev=rows.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);
      avgE=ev.length?ev.reduce((a,b)=>a+b,0)/ev.length:null;
      gb=AN.map(g=>({g,n:rows.filter(r=>r[3][sub]&&AM[r[3][sub][0]]===g).length})).filter(x=>x.n>0);
    }
    const send=rows.filter(r=>r[4]).length,ehcp=rows.filter(r=>r[5]).length,fsm=rows.filter(r=>r[6]).length;
    const senCats2={K:0,E:0,Add:0,Strat:0,N:0};
    rows.forEach(r=>{const c2=SEN_STATUS[String(r[0])];if(c2){if(c2==='K')senCats2.K++;else if(c2==='E')senCats2.E++;else if(c2==='Add'||c2==='add')senCats2.Add++;else if(c2==='Strat'||c2==='strat')senCats2.Strat++;else if(c2==='N')senCats2.N++}});

    function gradeCount(rs,grade){
      if(isAll){let c2=0;rs.forEach(r=>{SUBS.forEach(s2=>{if(r[3][s2]&&AM[r[3][s2][0]]===grade)c2++})});return c2}
      else{return rs.filter(r=>r[3][sub]&&AM[r[3][sub][0]]===grade).length}
    }
    gb.forEach(x=>{
      x.sendN=gradeCount(rows.filter(r=>r[4]),x.g);
      x.ehcpN=gradeCount(rows.filter(r=>r[5]),x.g);
      x.fsmN=gradeCount(rows.filter(r=>r[6]),x.g);
    });

    function subAvg(rs,metric){
      if(!rs.length)return null;
      if(metric==='ab'){
        if(isAll){const p=rs.map(r=>{const s=SUBS.map(s2=>r[3][s2]?AS[AM[r[3][s2][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null}).filter(v=>v!=null);return p.length?(p.reduce((a,b)=>a+b,0)/p.length):null}
        else{const s=rs.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null}
      }else{
        if(isAll){const p=rs.map(r=>{const e=SUBS.map(s2=>r[3][s2]?r[3][s2][1]:null).filter(e2=>e2!=null&&e2>0);return e.length?e.reduce((a,b)=>a+b,0)/e.length:null}).filter(v=>v!=null);return p.length?(p.reduce((a,b)=>a+b,0)/p.length):null}
        else{const e=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e2=>e2!=null&&e2>0);return e.length?e.reduce((a,b)=>a+b,0)/e.length:null}
      }
    }
    const sendAb=subAvg(rows.filter(r=>r[4]),'ab'),ehcpAb=subAvg(rows.filter(r=>r[5]),'ab'),fsmAb=subAvg(rows.filter(r=>r[6]),'ab');
    const sendEf=subAvg(rows.filter(r=>r[4]),'ef'),ehcpEf=subAvg(rows.filter(r=>r[5]),'ef'),fsmEf=subAvg(rows.filter(r=>r[6]),'ef');

    const pupilIdxSet=new Set(rows.map(r=>r[0]));
    const ayStart=`${ay}-09-01`,ayEnd=`${ay+1}-07-31`;
    const coSanc=(DD.sanctions||[]).filter(s=>pupilIdxSet.has(s[0])&&s[2]>=ayStart&&s[2]<=ayEnd&&(isAll||s[3]===sub));
    const nCodes=coSanc.filter(s=>s[1]===0).length;
    const nOnCalls=coSanc.filter(s=>s[1]===1).length;
    const nDetentions=coSanc.filter(s=>s[1]===2).length;

    const isCurrent=ay===CAY;
    const isFuture=ay>CAY;
    years.push({yg,ay,ayLabel,pupils:rows.length,avg,avgE,gb,
      send,ehcp,fsm,senCats2,_codeTip:sancTipAttrs(gb[0],gb[2],sancCatsFor(new Set(rows.map(r=>r[0])),DD.sanctions||[],SANC_DET),'Codes'),sendAb,ehcpAb,fsmAb,sendEf,ehcpEf,fsmEf,
      nCodes,nOnCalls,nDetentions,isCurrent,isFuture});
  }

  const out=document.getElementById('prg-out');
  if(!years.length){out.innerHTML='<div style="color:var(--mu);padding:2rem">No data for Intake '+ink+'</div>';return}

  const tblRows=years.map(c=>{
    const abTip=`All: ${fV(c.avg,2)}${c.send?`&#10;SEND (${c.send}): ${fV(c.sendAb,2)}`:''}${c.ehcp?`&#10;EHCP (${c.ehcp}): ${fV(c.ehcpAb,2)}`:''}${c.fsm?`&#10;FSM (${c.fsm}): ${fV(c.fsmAb,2)}`:''}`;
    const efTip=`All: ${fV(c.avgE,2)}${c.send?`&#10;SEND (${c.send}): ${fV(c.sendEf,2)}`:''}${c.ehcp?`&#10;EHCP (${c.ehcp}): ${fV(c.ehcpEf,2)}`:''}${c.fsm?`&#10;FSM (${c.fsm}): ${fV(c.fsmEf,2)}`:''}`;
    return`<tr>
      <td style="font-weight:500">Y${c.yg} — ${c.ayLabel}${c.isCurrent?' <span style="font-size:.6rem;color:var(--ac)">\u25cf current</span>':''}</td>
      <td>${c.pupils}</td>
      <td style="font-weight:600;color:${aC(c.avg)};cursor:help" title="${abTip}">${fV(c.avg,2)}</td>
      <td style="font-weight:600;color:${eC(c.avgE)};cursor:help" title="${efTip}">${fV(c.avgE,2)}</td>
      <td>${c.gb.map(x=>{const tip=`${x.g}: ${x.n}${x.sendN?`&#10;SEND: ${x.sendN}`:''}${x.ehcpN?`&#10;EHCP: ${x.ehcpN}`:''}${x.fsmN?`&#10;FSM: ${x.fsmN}`:''}`;return`<span style="display:inline-block;margin:.1rem;padding:.08rem .3rem;border-radius:3px;font-size:.65rem;background:${GC[x.g]}22;color:${GC[x.g]};cursor:help" title="${tip}">${x.g.slice(0,3)} ${x.n}</span>`}).join('')}</td>
      <td style="text-align:center;${c.send?'color:#f97316;font-weight:600':'color:var(--mu)'}">${c.send||'\u2014'}</td>
      <td style="text-align:center;font-size:.6rem;color:var(--mu)">${c.senCats2?.K||'\u2014'}</td>
      <td style="text-align:center;font-size:.6rem;color:var(--mu)">${c.senCats2?.E||'\u2014'}</td>
      <td style="text-align:center;font-size:.6rem;color:var(--mu)">${c.senCats2?.Add||'\u2014'}</td>
      <td style="text-align:center;font-size:.6rem;color:var(--mu)">${c.senCats2?.Strat||'\u2014'}</td>
      <td style="text-align:center;font-size:.6rem;color:var(--mu)">${c.senCats2?.N||'\u2014'}</td>
      <td style="text-align:center;${c.fsm?'color:#6488ff;font-weight:600':'color:var(--mu)'}">${c.fsm||'\u2014'}</td>
      <td style="text-align:center;${c.nCodes?'color:#f97316;font-weight:600':'color:var(--mu)'}">${c.nCodes||'\u2014'}</td>
      <td style="text-align:center;${c.nOnCalls?'color:#ef4444;font-weight:600':'color:var(--mu)'}">${c.nOnCalls||'\u2014'}</td>
      <td style="text-align:center;${c.nDetentions?'color:#7c3aed;font-weight:600':'color:var(--mu)'}">${c.nDetentions||'\u2014'}</td>
    </tr>`}).join('');

  out.innerHTML=`<div class="dw"><div class="dwt">Intake ${ink} — ${subLabel} Progression</div>
    <table class="d ctr"><thead><tr><th>Year Group — Academic Year</th><th>Pupils</th><th>Avg Ability</th><th>Avg Effort</th><th>Grade Distribution — Final Term</th><th style="color:#f97316">SEND</th><th style="color:#f97316;font-size:.55rem">K</th><th style="color:#a78bfa;font-size:.55rem">E</th><th style="color:#38bdf8;font-size:.55rem">Add</th><th style="color:#34d399;font-size:.55rem">Strat</th><th style="color:#94a3b8;font-size:.55rem">N</th><th style="color:#6488ff">FSM</th><th style="color:#f97316">${isAll?'':'In-lesson '}Codes</th><th style="color:#ef4444">${isAll?'':'In-lesson '}On-Calls</th><th style="color:#7c3aed">${isAll?'':'In-lesson '}Detentions</th></tr></thead>
    <tbody>${tblRows}</tbody></table></div>
    <div class="ch-g"><div class="chc"><div class="cht">${subLabel} Ability — Intake ${ink} Progression</div><div class="chw"><canvas id="c-prgab"></canvas></div></div><div class="chc"><div class="cht">${subLabel} Effort — Intake ${ink} Progression</div><div class="chw"><canvas id="c-prgef"></canvas></div></div></div>
    <div class="chc full" style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem;margin-bottom:1.25rem"><div class="cht">${subLabel} Grade Distribution Over Time — Intake ${ink}</div><div class="chw" style="height:clamp(200px,18vw,320px)"><canvas id="c-prggrade"></canvas></div></div>
    <div class="chc full" style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem;margin-bottom:1.25rem"><div class="cht">Effort Distribution Over Time — Intake ${ink} <span style="font-weight:400;font-size:.55rem;color:var(--mu);margin-left:.3rem">(1 = Highest Effort)</span></div><div class="chw" style="height:clamp(200px,18vw,320px)"><canvas id="c-prgefgrade"></canvas></div></div>`;

  dc('prgab');dc('prgef');

  // X-axis: one point per term across all school years (T1-T3 for Y7-Y11 = 15 points)
  const termLabels=[];
  for(let yg=7;yg<=11;yg++) for(const t of['T1','T2','T3']) termLabels.push(`Y${yg} ${t}`);

  const abPoints=[],efPoints=[],abMeta=[],efMeta=[];
  termLabels.forEach(stage=>{
    const[ygStr,term]=stage.split(' ');
    const stageYG=parseInt(ygStr.slice(1));
    const stageAY=ink+(stageYG-7);
    const period=`${term} ${stageAY}`;
    const rows=(PRG[inkK]||{})[period];
    if(!rows||!rows.length){abPoints.push(null);efPoints.push(null);abMeta.push(null);efMeta.push(null);return}

    function calcAb(rs){
      if(isAll){const pA=rs.map(r=>{const s=SUBS.map(s2=>r[3][s2]?AS[AM[r[3][s2][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null}).filter(v=>v!=null);return pA.length?parseFloat((pA.reduce((a,b)=>a+b,0)/pA.length).toFixed(2)):null}
      else{const sc=rs.map(r=>r[3][sub]?AS[AM[r[3][sub][0]]]||0:0).filter(v=>v>0);return sc.length?parseFloat((sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(2)):null}
    }
    function calcEf(rs){
      if(isAll){const pE=rs.map(r=>{const e=SUBS.map(s2=>r[3][s2]?r[3][s2][1]:null).filter(e2=>e2!=null&&e2>0);return e.length?e.reduce((a,b)=>a+b,0)/e.length:null}).filter(v=>v!=null);return pE.length?parseFloat((pE.reduce((a,b)=>a+b,0)/pE.length).toFixed(2)):null}
      else{const ev=rs.map(r=>r[3][sub]?r[3][sub][1]:null).filter(e=>e!=null&&e>0);return ev.length?parseFloat((ev.reduce((a,b)=>a+b,0)/ev.length).toFixed(2)):null}
    }
    abPoints.push(calcAb(rows));
    efPoints.push(calcEf(rows));
    const sendR=rows.filter(r=>r[4]),ehcpR=rows.filter(r=>r[5]),fsmR=rows.filter(r=>r[6]);
    abMeta.push({n:rows.length,send:sendR.length?calcAb(sendR):null,sendN:sendR.length,ehcp:ehcpR.length?calcAb(ehcpR):null,ehcpN:ehcpR.length,fsm:fsmR.length?calcAb(fsmR):null,fsmN:fsmR.length});
    efMeta.push({n:rows.length,send:sendR.length?calcEf(sendR):null,sendN:sendR.length,ehcp:ehcpR.length?calcEf(ehcpR):null,ehcpN:ehcpR.length,fsm:fsmR.length?calcEf(fsmR):null,fsmN:fsmR.length});
  });

  const flagTip=()=>({callbacks:{label:ctx=>{
    const ds=ctx.dataset;const m=ds._meta?.[ctx.dataIndex];
    const lines=[` ${ds.label}: ${ctx.parsed.y!=null?ctx.parsed.y:'—'}`];
    if(m){
      if(m.sendN) lines.push(`   SEND (${m.sendN}): ${m.send!=null?m.send.toFixed(2):'—'}`);
      if(m.ehcpN) lines.push(`   EHCP (${m.ehcpN}): ${m.ehcp!=null?m.ehcp.toFixed(2):'—'}`);
      if(m.fsmN) lines.push(`   FSM (${m.fsmN}): ${m.fsm!=null?m.fsm.toFixed(2):'—'}`);
    }
    return lines;
  }}});

  // Background bands to delineate Y7/Y8/Y9/Y10/Y11
  const bandPlugin={id:'ygBands',beforeDraw(chart){
    const{ctx,chartArea:{left,right,top,bottom},scales:{x}}=chart;
    for(let yg=7;yg<=11;yg++){
      const i0=(yg-7)*3,i1=i0+2;
      const x0=x.getPixelForValue(i0)-(i0===0?0:(x.getPixelForValue(i0)-x.getPixelForValue(i0-1))/2);
      const x1=x.getPixelForValue(i1)+(x.getPixelForValue(i1)-x.getPixelForValue(i1===14?i1:i1))/2;
      ctx.fillStyle=(yg%2===0)?'rgba(100,136,255,0.04)':'rgba(0,0,0,0)';
      ctx.fillRect(Math.max(left,x0),top,Math.min(right,x1)-Math.max(left,x0),bottom-top);
    }
  }};

  // Build sub-group point arrays from meta
  const sendAbPts=abMeta.map(m=>m&&m.sendN?m.send:null);
  const ehcpAbPts=abMeta.map(m=>m&&m.ehcpN?m.ehcp:null);
  const fsmAbPts=abMeta.map(m=>m&&m.fsmN?m.fsm:null);
  const sendEfPts=efMeta.map(m=>m&&m.sendN?m.send:null);
  const ehcpEfPts=efMeta.map(m=>m&&m.ehcpN?m.ehcp:null);
  const fsmEfPts=efMeta.map(m=>m&&m.fsmN?m.fsm:null);

  // Only include sub-group lines if they have any data
  const hasSend=sendAbPts.some(v=>v!=null);
  const hasEhcp=ehcpAbPts.some(v=>v!=null);
  const hasFsm=fsmAbPts.some(v=>v!=null);

  const subgroupTip=()=>({callbacks:{
    label:ctx=>{
      const ds=ctx.dataset;
      const m=ds._meta?.[ctx.dataIndex];
      if(m&&m.n!=null) return` ${ds.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(2):'—'} (n=${m.n})`;
      return` ${ds.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(2):'—'}`;
    }
  }});

  // Recalculate y-axis range including sub-group lines
  const allAbVals=[...abPoints,...sendAbPts,...ehcpAbPts,...fsmAbPts].filter(v=>v!=null);
  const abMin2=allAbVals.length?Math.max(0.5,Math.floor((Math.min(...allAbVals)-0.3)*10)/10):0.5;
  const abMax2=allAbVals.length?Math.min(7.5,Math.ceil((Math.max(...allAbVals)+0.3)*10)/10):7.5;
  const allEfVals=[...efPoints,...sendEfPts,...ehcpEfPts,...fsmEfPts].filter(v=>v!=null);
  const efMin2=allEfVals.length?Math.max(0.5,Math.floor((Math.min(...allEfVals)-0.3)*10)/10):0.5;
  const efMax2=allEfVals.length?Math.min(4.5,Math.ceil((Math.max(...allEfVals)+0.3)*10)/10):4.5;

  const mkSubDs=(label,data,color,meta)=>({
    label,data,borderColor:color,backgroundColor:'transparent',
    borderWidth:1.5,borderDash:[5,3],pointRadius:3,pointStyle:'triangle',
    tension:.35,fill:false,spanGaps:true,_meta:meta
  });

  const abDatasets=[
    {label:`Intake ${ink} (All)`,data:abPoints,borderColor:'#6488ff',backgroundColor:'#6488ff18',borderWidth:2.5,pointRadius:4,tension:.35,fill:true,spanGaps:true,_meta:abMeta.map(m=>m?{n:m.n}:null)},
    ...(hasSend?[mkSubDs('SEND',sendAbPts,'#f97316',abMeta.map(m=>m&&m.sendN?{n:m.sendN}:null))]: []),
    ...(hasEhcp?[mkSubDs('EHCP',ehcpAbPts,'#a78bfa',abMeta.map(m=>m&&m.ehcpN?{n:m.ehcpN}:null))]: []),
    ...(hasFsm?[mkSubDs('FSM',fsmAbPts,'#38bdf8',abMeta.map(m=>m&&m.fsmN?{n:m.fsmN}:null))]: []),
  ];
  const efDatasets=[
    {label:`Intake ${ink} (All)`,data:efPoints,borderColor:'#34d399',backgroundColor:'#34d39918',borderWidth:2.5,pointRadius:4,tension:.35,fill:true,spanGaps:true,_meta:efMeta.map(m=>m?{n:m.n}:null)},
    ...(hasSend?[mkSubDs('SEND',sendEfPts,'#f97316',efMeta.map(m=>m&&m.sendN?{n:m.sendN}:null))]: []),
    ...(hasEhcp?[mkSubDs('EHCP',ehcpEfPts,'#a78bfa',efMeta.map(m=>m&&m.ehcpN?{n:m.ehcpN}:null))]: []),
    ...(hasFsm?[mkSubDs('FSM',fsmEfPts,'#38bdf8',efMeta.map(m=>m&&m.fsmN?{n:m.fsmN}:null))]: []),
  ];

  const chartOpts2=(yMin,yMax,isAb)=>({responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:'#666666',font:{family:'Outfit',size:10},boxWidth:10,padding:10}},
      tooltip:subgroupTip()
    },
    scales:{
      y:{min:yMin,max:yMax,ticks:{color:'#666666',font:{size:11},stepSize:1,
        callback:isAb?v=>{const n=['Bel','Dev','Wrk','Met','Con','Skl','Exc'];return Number.isInteger(v)&&v>=1&&v<=7?n[v-1]:''}:undefined},
        grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}},
      x:{ticks:{color:'#666666',font:{size:8},maxRotation:45},grid:{color:'#d4d4d422'},border:{color:'#d4d4d4'}}
    }
  });

  sc2('prgab',new Chart(document.getElementById('c-prgab'),{type:'line',
    data:{labels:termLabels,datasets:abDatasets},
    options:chartOpts2(abMin2,abMax2,true),plugins:[bandPlugin]}));

  sc2('prgef',new Chart(document.getElementById('c-prgef'),{type:'line',
    data:{labels:termLabels,datasets:efDatasets},
    options:chartOpts2(efMin2,efMax2,false),plugins:[bandPlugin]}));

  // ── Stacked grade distribution bar chart ──
  dc('prggrade');
  // For each term, count how many pupils (or grade-slots if isAll) sit in each grade
  const gradeData={};
  AN.forEach(g=>{gradeData[g]=[]});
  termLabels.forEach(stage=>{
    const[ygStr,term]=stage.split(' ');
    const stageYG=parseInt(ygStr.slice(1));
    const stageAY=ink+(stageYG-7);
    const period=`${term} ${stageAY}`;
    const rows=(PRG[inkK]||{})[period];
    if(!rows||!rows.length){AN.forEach(g=>gradeData[g].push(null));return}
    const counts={};AN.forEach(g=>{counts[g]=0});
    if(isAll){
      rows.forEach(r=>{SUBS.forEach(s2=>{if(r[3][s2]){const g=AM[r[3][s2][0]];if(counts[g]!=null)counts[g]++}})});
    }else{
      rows.forEach(r=>{if(r[3][sub]){const g=AM[r[3][sub][0]];if(counts[g]!=null)counts[g]++}});
    }
    AN.forEach(g=>gradeData[g].push(counts[g]||0));
  });

  const gradeDatasets=AN.map(g=>({
    label:g,
    data:gradeData[g],
    backgroundColor:GC[g]+'cc',
    borderColor:GC[g],
    borderWidth:0,
    borderRadius:0,
    stack:'grades'
  }));

  sc2('prggrade',new Chart(document.getElementById('c-prggrade'),{
    type:'bar',
    data:{labels:termLabels,datasets:gradeDatasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#666666',font:{family:'Outfit',size:9},boxWidth:10,padding:8}},
        tooltip:{callbacks:{
          title:ctx=>ctx[0]?.label||'',
          label:ctx=>{
            const total=AN.reduce((s,g)=>{const d=gradeData[g][ctx.dataIndex];return s+(d||0)},0);
            const pct=total>0?((ctx.parsed.y/total)*100).toFixed(1):'0';
            return` ${ctx.dataset.label}: ${ctx.parsed.y} (${pct}%)`;
          }
        }}
      },
      scales:{
        x:{stacked:true,ticks:{color:'#666666',font:{size:8},maxRotation:45},grid:{color:'#d4d4d422'},border:{color:'#d4d4d4'}},
        y:{stacked:true,beginAtZero:true,ticks:{color:'#666666',font:{size:8},stepSize:isAll?SUBS.length:1},grid:{color:'#d4d4d444'},border:{color:'#d4d4d4'}}
      }
    },
    plugins:[bandPlugin]
  }));

  // ── Stacked effort distribution bar chart ──
  dc('prgefgrade');
  const effortColors={'1':'#ef4444','2':'#f97316','3':'#38bdf8','4':'#34d399'};
  const effortLabels=['1 — Excellent','2 — Good','3 — Developing','4 — Low'];
  const effortData={1:[],2:[],3:[],4:[]};
  termLabels.forEach(stage=>{
    const[ygStr,term]=stage.split(' ');
    const stageYG=parseInt(ygStr.slice(1));
    const stageAY=ink+(stageYG-7);
    const period=`${term} ${stageAY}`;
    const rows=(PRG[inkK]||{})[period];
    if(!rows||!rows.length){[1,2,3,4].forEach(e=>effortData[e].push(null));return}
    const counts={1:0,2:0,3:0,4:0};
    if(isAll){
      rows.forEach(r=>{SUBS.forEach(s2=>{if(r[3][s2]&&r[3][s2][1]>=1&&r[3][s2][1]<=4)counts[r[3][s2][1]]++})});
    }else{
      rows.forEach(r=>{if(r[3][sub]&&r[3][sub][1]>=1&&r[3][sub][1]<=4)counts[r[3][sub][1]]++});
    }
    [1,2,3,4].forEach(e=>effortData[e].push(counts[e]||0));
  });

  const effortDatasets=[1,2,3,4].map(e=>({
    label:effortLabels[e-1],
    data:effortData[e],
    backgroundColor:effortColors[e]+'cc',
    borderColor:effortColors[e],
    borderWidth:0,
    stack:'effort'
  }));

  sc2('prgefgrade',new Chart(document.getElementById('c-prgefgrade'),{
    type:'bar',
    data:{labels:termLabels,datasets:effortDatasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#666666',font:{family:'Outfit',size:9},boxWidth:10,padding:8}},
        tooltip:{callbacks:{
          title:ctx=>ctx[0]?.label||'',

// ── TEACHER VIEW ──
function rTV(){
  const tMap={};
  for(const[ik,enrols]of Object.entries(ENR)){
    const ink=parseInt(ik.slice(1));
    enrols.filter(r=>r.t==='cls').forEach(r=>{
      const ay=parseInt(r.f.slice(0,4));
      const yg2=ygAt(ink,ay);
      if(yg2<7||yg2>11) return;
      const key=`${r.tc}|${r.s}|${ink}|${r.c}|${ay}`;
      if(!tMap[r.tc])tMap[r.tc]=[];
      if(!tMap[r.tc].find(e=>e._k===key)){
        tMap[r.tc].push({_k:key,s:r.s,ink,yg:yg2,c:r.c,ay:`${ay}-${ay+1}`,ayI:ay,tc:r.tc,pups:new Set()})
      }
      tMap[r.tc].find(e=>e._k===key).pups.add(r.x);
    });
  }
  const sorted=Object.keys(tMap).sort((a,b)=>a.localeCompare(b));

  document.getElementById('tv-out').innerHTML=sorted.map((teacher,ti)=>{
    const recs=tMap[teacher];
    // Default sort: Year Group ascending, then academic year descending, then subject
    const rows=recs.sort((a,b)=>a.yg-b.yg||b.ayI-a.ayI||a.s.localeCompare(b.s)).map(r=>{
      const allP=PER.filter(p=>(PRG[inkKey(r.ink)]||{})[p]);
      const ayYear=parseInt(r.ay.split('-')[0]);
      const ayP=allP.filter(p=>{const y=parseInt(p.split(' ')[1]);return y===ayYear});

      // Prior = last term of the PREVIOUS academic year (T3 of ayYear-1)
      const priorCandidates=allP.filter(p=>{const y=parseInt(p.split(' ')[1]);return y===ayYear-1});
      const priorP=priorCandidates.length?priorCandidates[priorCandidates.length-1]:null;

      // After = first term of the NEXT academic year (T1 of ayYear+1)
      const afterCandidates=allP.filter(p=>{const y=parseInt(p.split(' ')[1]);return y===ayYear+1});
      const afterP=afterCandidates.length?afterCandidates[0]:null;

      const avgF=(period)=>{if(!period)return null;const rs=(PRG[inkKey(r.ink)]||{})[period]||[];const f=rs.filter(row=>r.pups.has(row[0]));const s=f.map(row=>row[3][r.s]?AS[AM[row[3][r.s][0]]]||0:0).filter(v=>v>0);return s.length?s.reduce((a,b)=>a+b,0)/s.length:null};
      const efF=(period)=>{if(!period)return null;const rs=(PRG[inkKey(r.ink)]||{})[period]||[];const f=rs.filter(row=>r.pups.has(row[0]));const v=f.map(row=>row[3][r.s]?row[3][r.s][1]:null).filter(e=>e!=null&&e>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null};

      let dA=null,dE=null;ayP.forEach(p=>{const a=avgF(p),e=efF(p);if(a!=null)dA=(dA||0)+a;if(e!=null)dE=(dE||0)+e});
      if(dA!=null)dA/=ayP.length;if(dE!=null)dE/=ayP.length;
      const pA=avgF(priorP),aA=avgF(afterP),pE=efF(priorP),aE=efF(afterP);
      const aAS=aA!=null&&dA!=null?aA>dA?'color:#34d399':aA<dA-1?'color:#ef4444;font-weight:600':aA<dA?'color:#ef4444':'':'';
      const aES=aE!=null&&dE!=null?aE<dE?'color:#34d399':aE>dE+1?'color:#ef4444;font-weight:600':aE>dE?'color:#ef4444':'':'';

      return`<tr><td>Y${r.yg}</td><td>${r.ay}</td><td>${r.c}</td><td>${r.s}</td><td>${r.pups.size}</td><td>${fV(pA,2)}</td><td style="font-weight:600">${fV(dA,2)}</td><td style="${aAS}">${fV(aA,2)}</td><td>${fV(pE,2)}</td><td style="font-weight:600">${fV(dE,2)}</td><td style="${aES}">${fV(aE,2)}</td></tr>`}).join('');

    // Summary: subject taught, number of classes, current YGs
    const subjsTaught=[...new Set(recs.map(r=>r.s))].join(', ');
    const ygsTaught=[...new Set(recs.map(r=>'Y'+r.yg))].sort().join(', ');

    return`<div class="dw" style="padding:0;overflow:hidden"><div class="dwt" style="padding:.75rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;margin-bottom:0" onclick="const bd=this.nextElementSibling;bd.classList.toggle('tt-hide');this.querySelector('.tv-arrow').classList.toggle('tt-open')"><span>${teacher}</span><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.68rem;color:var(--mu)">${subjsTaught} · ${ygsTaught} · ${recs.length} class${recs.length!==1?'es':''}</span><span class="tv-arrow" style="margin-left:auto;font-size:.6rem;transition:transform .2s">▼</span></div><div class="tt-hide" style="padding:0 1rem .75rem"><div style="overflow-x:auto"><table class="d"><thead><tr><th>Grp</th><th>Year</th><th>Cls</th><th>Subj</th><th>#</th><th>Ab Prior</th><th>Ab During</th><th>Ab After</th><th>Ef Prior</th><th>Ef During</th><th>Ef After</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`}).join('');
}

function rBC(){

  const tgVal=document.getElementById('bc-tg').value;
  const out=document.getElementById('bc-out');
  out.innerHTML='<div style="color:var(--mu);padding:1rem">Loading...</div>';

  // Get year groups to process
  const ygs=ygVal==='all'?CFG.intakes.filter(ink=>curYG(ink)>=7&&curYG(ink)<=11).map(ink=>curYG(ink)):[parseInt(ygVal)];
  const filterLabel=ygVal==='all'?'All Years':`Y${ygVal}`;
  const tgLabel=tgVal==='all'?'All TGs':tgVal;

  // Collect all pupils across selected year groups
  let allLR=[];
  const allEnrols=[];
  ygs.forEach(yg=>{
    const enrols=ygEnrol(yg);
    const pp=ygPeriods(yg);
    if(!pp.length) return;
    const lp=pp[pp.length-1];
    const lr=ygRows(yg,lp);
    // Add year group info to each row
    lr.forEach(r=>r._yg=yg);
    allLR.push(...lr);
    allEnrols.push(...enrols);
  });

  if(!allLR.length){
    out.innerHTML=`<div style="color:var(--mu);padding:2rem">No data for ${filterLabel}</div>`;
    return;
  }

  // TG lookup using collected enrolments
  function getTG(px){
    const tgRec=allEnrols.filter(r=>r.t==='tg'&&r.x===px&&r.u===null);
    return tgRec.length?tgRec[tgRec.length-1].v:'—';
  }

  // Filter by TG if specified
  if(tgVal!=='all'){
    allLR=allLR.filter(r=>getTG(r[0])===tgVal);
  }

  if(!allLR.length){
    out.innerHTML=`<div style="color:var(--mu);padding:2rem">No pupils in ${filterLabel} / ${tgLabel}</div>`;
    return;
  }

  const SAN=DD.sanctions||[];

  // Find the latest sanction date for these pupils (not today — data may lag)
  const allPxSet=new Set(allLR.map(r=>r[0]));
  let latestSancDate=null;
  SAN.forEach(s=>{if(allPxSet.has(s[0])&&s[2]<=todayISO&&(!latestSancDate||s[2]>latestSancDate))latestSancDate=s[2]});
  const bcEndDate=latestSancDate||todayISO;

  // Build school days list

    const cutIdx=Math.max(0,bcSD.length-nSD);

    const cls=allEnrols.find(r=>r.t==='cls'&&r.x===px&&r.s===subj&&r.u===null);

    }

  // Sortable table helper
  function bcSortTable(tableId,data,renderRow,defaultField){

      const sorted=[...data].sort((a,b)=>{
        const va=a[sortField],vb=b[sortField];
        if(va==null&&vb==null)return 0;

function rSEND(){

  out.innerHTML='<div style="color:var(--mu);padding:1rem">Loading SEND data...</div>';
  const ygVal=document.getElementById('send-yg').value;

  const _sToday=new Date();
  const _sTodayISO=`${_sToday.getFullYear()}-${String(_sToday.getMonth()+1).padStart(2,'0')}-${String(_sToday.getDate()).padStart(2,'0')}`;
  const ayStart=`${CAY}-09-01`;

  // Collect flagged pupils — flagIdx: 4=SEND, 5=EHCP, 6=FSM
  function collectFlagged(flagIdx,flagName){
    const pupils=[];
    const WLK=DD.weekLessons||{};

    for(const[ik,periods]of Object.entries(PRG)){
      const ink=parseInt(ik.slice(1));

      if(yg<7||yg>11) continue;
