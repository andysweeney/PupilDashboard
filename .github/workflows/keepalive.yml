name: Supabase keep-alive

# Pings the Supabase project twice a week so the free-tier project is not
# paused after 7 days of inactivity.
#
# Place this file at:  .github/workflows/keepalive.yml

on:
  schedule:
    - cron: '0 6 * * 1,4'        # 06:00 UTC every Monday and Thursday
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase (touches Postgres, resets the inactivity timer)
        run: |
          URL="https://tpgzfdvholuhgrzkdmxe.supabase.co"
          # Publishable key — safe to expose (already public in index.html).
          KEY="sb_publishable_gO94qgi7b30TeCfaVe3fHw_oKv71PyA"

          resp=$(curl --show-error --silent -w $'\n%{http_code}' \
            "$URL/rest/v1/keepalive?select=ping&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            -H "Cache-Control: no-cache")

          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP status: $code"
          echo "Response body: $body"

          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Keep-alive ping failed (HTTP $code)"
            exit 1
          fi
          echo "Keep-alive ping OK at $(date -u)"
